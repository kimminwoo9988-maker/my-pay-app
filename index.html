            );
        }

        // ─── 입력 폼 창 ───
        function BottomSheetForm({ clients, onAdd, onNewClient, onClose }) {
            const [client, setClient] = useState(""); 
            const [amount, setAmount] = useState(""); 
            const [desc, setDesc] = useState("");
            const [dateVal, setDateVal] = useState(today()); 
            const [deadline, setDeadline] = useState(today()); 
            const [useDeadline, setUseDeadline] = useState(false);
            const [discount, setDiscount] = useState(false); 
            const [showNew, setShowNew] = useState(false); 
            const [newName, setNewName] = useState(""); 
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = ''; };
            }, []);
            
            const submit = () => { 
                if (isSubmitting) return; 
                if (!client || !amount) return; 
                const raw = parseInt(amount.replace(/,/g,""),10); 
                if (isNaN(raw) || raw<=0) return; 
                
                setIsSubmitting(true); 
                const [y,m,d] = dateVal.split("-").map(Number); 
                onAdd({ 
                    client, 
                    amount: raw, 
                    desc: discount ? "" : desc.trim(), 
                    date: new Date(y,m-1,d,12).toISOString(), 
                    deadline: useDeadline ? deadline : null, 
                    discount 
                }); 
                setTimeout(() => { setIsSubmitting(false); onClose(); }, 100); 
            };
            
            const addC = () => { 
                if (!newName.trim()) return; 
                onNewClient(newName.trim()); 
                setClient(newName.trim()); 
                setNewName(""); 
                setShowNew(false); 
            };

            return (
                <div style={{...S.overlay, alignItems: "flex-end", padding: 0}} onClick={onClose}>
                    <div 
                        className="animate-slide" 
                        onClick={e => e.stopPropagation()} 
                        style={{ 
                            background: "#1a1b26", 
                            width: "100%", 
                            maxWidth: 480, 
                            borderTopLeftRadius: 36, 
                            borderTopRightRadius: 36, 
                            padding: "0 24px calc(env(safe-area-inset-bottom) + 30px)", 
                            boxShadow: "0 -10px 40px rgba(0,0,0,0.6)", 
                            display: "flex", 
                            flexDirection: "column"
                        }}
                    >
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 24, paddingBottom: 24 }}>
                            <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>새 작업 기록</div>
                            <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", border: "none", width: 36, height: 36, borderRadius: "50%", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 16 }}>✕</button>
                        </div>

                        <div style={{...S.field, width: "100%", boxSizing: "border-box"}}>
                            <div style={{ display: "flex", gap: 10, width: "100%" }}>
                                <input type="date" value={dateVal} onChange={e => setDateVal(e.target.value)} style={{...S.input, colorScheme: "dark", flex: 1, minWidth: 0, padding: "14px 12px"}} />
                                {!showNew && (
                                    <select value={client} onChange={e => setClient(e.target.value)} style={{...S.select, flex: 1.5, minWidth: 0, padding: "14px 12px"}}>
                                        <option value="">업체 선택</option>
                                        {(clients||[]).map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                )}
                                {showNew && <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="새 업체명" style={{...S.input, flex: 1.5, minWidth: 0, padding: "14px 12px"}} onKeyDown={e => e.key==="Enter"&&addC()} autoFocus />}
                                {showNew ? (
                                    <button onClick={addC} style={{...S.confirmBtn, flexShrink: 0, padding: "0 16px"}}>추가</button>
                                ) : (
                                    <button onClick={() => setShowNew(true)} style={{...S.plusBtn, background: "rgba(255,255,255,0.05)", color: "#7aa2f7", flexShrink: 0, width: 52}}>+</button>
                                )}
                                {showNew && <button onClick={() => setShowNew(false)} style={{...S.plusBtn, background: "rgba(255,255,255,0.05)", color: "#a9b1d6", flexShrink: 0, width: 52}}>✕</button>}
                            </div>
                        </div>

                        <div style={{...S.field, width: "100%", boxSizing: "border-box"}}>
                            <div style={{ display: "flex", alignItems: "center", background: "rgba(0,0,0,0.2)", borderRadius: 18, border: "1px solid rgba(255,255,255,0.05)", padding: "10px 20px", width: "100%", boxSizing: "border-box" }}>
                                <input value={amount} onChange={e => setAmount(fmt(e.target.value))} placeholder="0" inputMode="numeric" style={{ flex: 1, background: "none", border: "none", color: discount?"#f7768e":"#7aa2f7", fontSize: 32, fontWeight: 900, textAlign: "right", outline: "none", padding: "16px 0", minWidth: 0 }} onKeyDown={e => e.key==="Enter"&&submit()} />
                                <span style={{ fontSize: 22, color: "#8a94b5", fontWeight: 800, marginLeft: 10, flexShrink: 0 }}>원</span>
                            </div>
                            <QuickBtns val={amount} setVal={setAmount} />
                        </div>

                        <div style={{ display: "flex", gap: 12, marginBottom: 16, width: "100%", boxSizing: "border-box" }}>
                            <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", background: discount?"rgba(247,118,142,0.15)":"rgba(255,255,255,0.05)", padding: "16px", borderRadius: 14, border: `1px solid ${discount?"#f7768e":"transparent"}`, flexShrink: 0, whiteSpace: "nowrap" }}>
                                <input type="checkbox" checked={discount} onChange={e => setDiscount(e.target.checked)} style={{ accentColor: "#f7768e", width: 22, height: 22, margin: 0 }} />
                                <span style={{ fontSize: 16, color: discount?"#f7768e":"#a9b1d6", fontWeight: 800 }}>할인 적용</span>
                            </label>
                            {!discount && <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="작업 내용 (선택)" style={{...S.input, flex: 1, minWidth: 0, boxSizing: "border-box"}} onKeyDown={e => e.key==="Enter"&&submit()} />}
                        </div>

                        <div style={{...S.field, display: "flex", flexDirection: "column", width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.02)", padding: "16px", borderRadius: 14}}>
                            <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                                <input type="checkbox" checked={useDeadline} onChange={e => setUseDeadline(e.target.checked)} style={{ accentColor: "#f7768e", width: 22, height: 22, margin: 0 }} />
                                <span style={{ fontSize: 16, color: useDeadline?"#f7768e":"#a9b1d6", fontWeight: 800 }}>마감일 알림 추가하기</span>
                            </label>
                            {useDeadline && (
                                <div className="animate-fade" style={{ marginTop: 16, display: "flex", width: "100%" }}>
                                    <input type="date" value={deadline} onChange={e => setDeadline(e.target.value)} style={{...S.input, flex: 1, minWidth: 0, display: "block", boxSizing: "border-box", colorScheme: "dark", borderColor: "rgba(247,118,142,0.4)", margin: 0}} />
                                </div>
                            )}
                        </div>
                        
                        <button onClick={submit} disabled={!client||!amount||isSubmitting} style={{...S.submitBtn, opacity: client&&amount?1:0.3, background: discount?"linear-gradient(135deg,#f7768e 0%,#ff9e64 100%)":"linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", width: "100%"}}>
                            {discount?"할인 내역 저장":"기록 저장하기"}
                        </button>
                    </div>
                </div>
            );
        }

        // ─── 삭제 모달 ───
        function DeleteModal({ entry, onConfirm, onCancel }) {
            if (!entry) return null;
            return (
                <div style={S.overlay} onClick={onCancel}>
                    <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 320, padding: 24, textAlign: "center", background: "#1a1b26"}}>
                        <div style={{width: 60, height: 60, borderRadius: "50%", background: "rgba(231,76,60,0.1)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px"}}>
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </div>
                        <h3 style={{marginTop: 0, marginBottom: 12, fontSize: 20, fontWeight: 900, color: "#fff"}}>기록 삭제</h3>
                        <p style={{fontSize: 15, color: "#8a94b5", lineHeight: 1.5, marginBottom: 24, wordBreak: "keep-all"}}>정말 이 기록을 삭제할까요?<br/>삭제된 데이터는 복구할 수 없습니다.</p>
                        <div style={{display: "flex", gap: 10}}>
                            <button onClick={onCancel} style={{flex: 1, padding: "14px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 14, color: "#a9b1d6", fontSize: 16, fontWeight: 800, cursor: "pointer"}}>취소</button>
                            <button onClick={onConfirm} style={{flex: 1, padding: "14px", background: "#e74c3c", border: "none", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer"}}>삭제하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── 메인 앱 ───
        function MainApp({ data, persist, user }) {
            const safeData = sanitizeData(data);
            const [pinState, setPinState] = useState(safeData.pin ? "verify" : "setup");
            const [vY, setVY] = useState(() => new Date().getFullYear()); 
            const [vM, setVM] = useState(() => new Date().getMonth());
            const [tab, setTab] = useState("summary"); 
            const [del, setDel] = useState(null);
            const [showAdd, setShowAdd] = useState(false); 
            const [showClientManager, setShowClientManager] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [hideHeader, setHideHeader] = useState(false); 

            useEffect(() => { 
                const handleVisibilityChange = () => { 
                    if (document.visibilityState === "hidden") {
                        if (safeData.pin) setPinState("verify");
                    } else if (document.visibilityState === "visible") {
                        const n = new Date();
                        setVY(n.getFullYear()); 
                        setVM(n.getMonth());
                        setTab("summary"); 
                    }
                }; 
                const handlePageHide = () => { 
                    if (safeData.pin) setPinState("verify"); 
                }; 
                
                document.addEventListener("visibilitychange", handleVisibilityChange); 
                window.addEventListener("pagehide", handlePageHide); 
                
                return () => { 
                    document.removeEventListener("visibilitychange", handleVisibilityChange); 
                    window.removeEventListener("pagehide", handlePageHide); 
                }; 
            }, [safeData.pin]);

            const handlePinSuccess = (p) => { 
                const n = new Date();
                if (pinState === "setup" || pinState === "change_new") { 
                    persist({...safeData, pin: p}); 
                } 
                setPinState("unlocked"); 
                setVY(n.getFullYear()); setVM(n.getMonth());
                setTab("summary");
            };

            const onUpdateClient = (oldN, newN) => { 
                if (oldN===newN||!newN.trim()||safeData.clients.includes(newN)) return; 
                const nc = safeData.clients.map(c => c===oldN?newN:c); 
                const ne = safeData.entries.map(e => e.client===oldN?{...e, client: newN}:e); 
                const np = {}; 
                Object.entries(safeData.payments).forEach(([k,v]) => { 
                    if (k.endsWith(`::${oldN}`)) np[k.replace(`::${oldN}`, `::${newN}`)]=v; 
                    else np[k]=v; 
                }); 
                persist({...safeData, clients: nc, entries: ne, payments: np}); 
            };

            const onDeleteClient = (name) => { 
                if (!confirm(`'${name}' 업체를 목록에서 삭제할까요?`)) return; 
                persist({...safeData, clients: safeData.clients.filter(c => c!==name)}); 
            };

            if (pinState !== "unlocked") return <LockScreen mode={pinState} savedPin={safeData.pin} onSuccess={handlePinSuccess} onCancel={pinState.startsWith("change_")?() => setPinState("unlocked"):null} />;

            const curMk = mk(vY, vM); 
            const nextMonthMk = vM===11?mk(vY+1,0):mk(vY,vM+1);
            
            const monthEntries = safeData.entries.filter(e => { 
                try {
                    const d = new Date(e.date); 
                    if(isNaN(d.getTime())) return false; 
                    return d.getFullYear()===vY&&d.getMonth()===vM; 
                } catch { return false; }
            });
            
            const initialUnpaidMap = calcBalance(safeData.entries, safeData.payments, curMk);
            const endOfMonthUnpaidMap = calcBalance(safeData.entries, safeData.payments, nextMonthMk);

            const onAdd = entry => persist({...safeData, entries: [...safeData.entries, {...entry, id: id(), paid: false}]});
            const onNewClient = name => { if (!safeData.clients.includes(name)) persist({...safeData, clients: [...safeData.clients, name]}); };
            const onPartialPay = (client, key, amount) => { const pk = `${key}::${client}`; persist({...safeData, payments: {...safeData.payments, [pk]: (safeData.payments[pk]||0)+amount}}); };
            const onResetPay = client => { const np = {...safeData.payments}; delete np[`${curMk}::${client}`]; persist({...safeData, payments: np}); };
            
            const onTogglePaid = (id, paid) => {
                persist({...safeData, entries: safeData.entries.map(e => e.id === id ? {...e, paid} : e)});
            };

            const onToggleMultiplePaid = (ids, paid) => {
                const idSet = new Set(ids);
                persist({...safeData, entries: safeData.entries.map(e => idSet.has(e.id) ? {...e, paid} : e)});
            };

            const onDelete = entry => { 
                const ent = safeData.entries.filter(e => e.id!==entry.id); 
                persist({...safeData, entries: ent, payments: cleanPay(safeData.payments, new Set(ent.map(e => e.client)))}); 
                setDel(null); 
            };
            const onEditEntry = (id, a, desc) => persist({...safeData, entries: safeData.entries.map(e => e.id===id?{...e, amount: a, desc}:e)});
            const onResetData = () => { persist({ entries: [], clients: [], payments: {}, pin: null }); setPinState("setup"); alert("모든 데이터가 초기화되었습니다."); };

            const prev = () => { if (vM===0) { setVY(vY-1); setVM(11); } else setVM(vM-1); };
            const next = () => { if (vM===11) { setVY(vY+1); setVM(0); } else setVM(vM+1); };
            const goToday = () => { const n = new Date(); setVY(n.getFullYear()); setVM(n.getMonth()); };

            return (
                <div style={S.app}>
                    <GlobalStyle />
                    {!hideHeader && <Header year={vY} month={vM} onPrev={prev} onNext={next} onToday={goToday} onOpenSettings={() => setShowSettings(true)} />}
                    
                    <div style={{ flex: 1, padding: "0 20px 140px", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
                        {tab==="summary" && <SummaryTab entries={monthEntries} unpaidMap={initialUnpaidMap} year={vY} month={vM} onDelete={setDel} onEditEntry={onEditEntry} allEntries={safeData.entries} setHideHeader={setHideHeader} payments={safeData.payments} />}
                        {tab==="payment" && <PaymentTab allEntries={safeData.entries} monthKey={curMk} onTogglePaid={onTogglePaid} onToggleMultiplePaid={onToggleMultiplePaid} onPartialPay={onPartialPay} onResetPay={onResetPay} payments={safeData.payments} />}
                    </div>
                    
                    <div style={{ position: "fixed", bottom: "max(24px, env(safe-area-inset-bottom))", left: 20, right: 20, maxWidth: 440, margin: "0 auto", height: 76, background: "rgba(26,27,38,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderRadius: 38, border: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 10px", zIndex: 30, boxShadow: "0 24px 48px rgba(0,0,0,0.5)" }}>
                        <button onClick={() => setTab("summary")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>
                            {tab==="summary" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}
                            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab==="summary"?"#7aa2f7":"#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                            <span style={{ fontSize: 13, fontWeight: tab==="summary"?900:700, color: tab==="summary"?"#7aa2f7":"#565f89" }}>정산</span>
                        </button>
                        <button onClick={() => setShowAdd(true)} style={{ width: 62, height: 62, borderRadius: "50%", background: "linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", color: "#0f111a", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transform: "translateY(-16px)", boxShadow: "0 12px 28px rgba(122,162,247,0.4)" }} onPointerDown={e => e.currentTarget.style.transform="translateY(-14px) scale(0.95)"} onPointerUp={e => e.currentTarget.style.transform="translateY(-16px) scale(1)"}>
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <button onClick={() => setTab("payment")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>
                            {tab==="payment" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}
                            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab==="payment"?"#9ece6a":"#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M5 6l4 12 3-8 3 8 4-12"/>
                                <path d="M4 11h16"/>
                                <path d="M4 15h16"/>
                            </svg>
                            <span style={{ fontSize: 13, fontWeight: tab==="payment"?900:700, color: tab==="payment"?"#9ece6a":"#565f89" }}>입금</span>
                        </button>
                    </div>
                    
                    {showSettings && <SettingsModal onChangePin={() => setPinState("change_old")} onManageClients={() => setShowClientManager(true)} onResetData={onResetData} onLogout={() => auth.signOut()} onClose={() => setShowSettings(false)} />}
                    {showClientManager && <ClientManagerModal clients={safeData.clients} onUpdate={onUpdateClient} onDelete={onDeleteClient} onClose={() => setShowClientManager(false)} />}
                    {showAdd && <BottomSheetForm clients={safeData.clients} onAdd={onAdd} onNewClient={onNewClient} onClose={() => setShowAdd(false)} />}
                    <DeleteModal entry={del} onConfirm={() => onDelete(del)} onCancel={() => setDel(null)} />
                </div>
            );
        }

        // ─── 최상위 앱 (Auth & Data Load) ───
        function App() {
            const [user, setUser] = useState(null); 
            const [data, setData] = useState(null); 
            const [loading, setLoading] = useState(true);

            useEffect(() => { 
                let unsub;
                try {
                    auth.getRedirectResult().catch(() => {});
                    unsub = auth.onAuthStateChanged(u => { 
                        if (u) { 
                            setUser(u); 
                            db.collection('users').doc(u.uid).get().then(doc => { 
                                if (doc.exists) { 
                                    setData(sanitizeData(doc.data())); 
                                } else { 
                                    let dd = { entries: [], clients: [], payments: {}, pin: null }; 
                                    try {
                                        const lr = localStorage.getItem(KEY); 
                                        if (lr) { const p = JSON.parse(lr); if (p) dd = sanitizeData(p); } 
                                    } catch(e) { console.warn("LocalStorage 접근 불가"); }
                                    setData(dd); 
                                    db.collection('users').doc(u.uid).set(dd); 
                                } 
                                setLoading(false); 
                            }).catch(() => { alert("데이터베이스 연결 실패!"); auth.signOut(); setLoading(false); }); 
                        } else { 
                            setUser(null); setData(null); setLoading(false); 
                        } 
                    }); 
                } catch(e) {
                    console.error("Auth 에러:", e);
                    setLoading(false);
                }
                return () => { if(unsub) unsub(); }; 
            }, []);

            const persist = useCallback(nd => { 
                setData(nd); 
                if (user) db.collection('users').doc(user.uid).set(nd).catch(console.error); 
            }, [user]);

            if (loading) return <div style={S.overlay}><div style={{color:"#fff", fontSize: 18, fontWeight: 800}}>서버 연결 중...</div></div>;
            
            if (!user) return (
                <div style={{...S.overlay, background: "#0f111a", flexDirection: "column", padding: 30, textAlign: "center"}}>
                <div style={{width: 80, height: 80, borderRadius: 24, background: "linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 30, boxShadow: "0 15px 35px rgba(122,162,247,0.3)"}}>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h1 style={{fontSize: 26, fontWeight: 900, color: "#fff", marginBottom: 10}}>정산기 Pro 클라우드</h1>
                <p style={{fontSize: 15, color: "#8a94b5", lineHeight: 1.5, marginBottom: 40, wordBreak: "keep-all"}}>데이터가 서버에 안전하게 자동 저장됩니다.<br/>폰을 바꾸거나 방문 기록을 지워도 안심하세요!</p>
                <button onClick={async () => {
                    try {
                        await auth.signInWithPopup(provider);
                    } catch (e) {
                        if (e.code === 'auth/popup-blocked' || e.code === 'auth/cancelled-popup-request') {
                            await auth.signInWithRedirect(provider);
                        } else {
                            alert("로그인 실패: " + e.message);
                        }
                    }
                }} style={{...S.submitBtn, display: "flex", alignItems: "center", justifyContent: "center", gap: 12, background: "#fff", color: "#111", padding: "16px 0", borderRadius: 16}}>
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>구글 계정으로 시작하기
                </button>
                </div>
            );
            return <MainApp data={data} persist={persist} user={user} />;
        }

        // ─── 공통 스타일 세팅 ───
        const S = {
            app: { background: "#0f111a", height: "100vh", overflow: "hidden", color: "#e8e8ed", maxWidth: 480, margin: "0 auto", position: "relative", display: "flex", flexDirection: "column" },
            header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "calc(env(safe-area-inset-top) + 20px) 20px 24px", background: "#0f111a", flexShrink: 0, zIndex: 10 },
            navBtn: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 14, color: "#8a94b5", width: 48, height: 48, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 },
            headerCenter: { display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer" },
            card: { background: "rgba(36,40,59,0.4)", borderRadius: 24, border: "1px solid rgba(255,255,255,0.03)" },
            calGrid: { display: "grid", gridTemplateColumns: "repeat(7,minmax(0,1fr))", gap: 6 },
            calHead: { textAlign: "center", fontSize: 13, fontWeight: 800, padding: "8px 0", color: "#565f89" },
            calCell: { display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 2px", minHeight: 60, minWidth: 0 },
            empty: { textAlign: "center", color: "#565f89", padding: "80px 0", fontSize: 16, fontWeight: 700 },
            field: { marginBottom: 24 },
            row: { display: "flex", gap: 12 },
            select: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none", appearance: "none" },
            plusBtn: { width: 54, height: 54, borderRadius: 14, fontSize: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: "none", fontWeight: 300 },
            confirmBtn: { padding: "0 20px", background: "#7aa2f7", border: "none", borderRadius: 14, color: "#0f111a", fontSize: 16, fontWeight: 900, cursor: "pointer" },
            input: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none", boxSizing: "border-box" },
            submitBtn: { width: "100%", padding: "20px 0", border: "none", borderRadius: 18, color: "#0f111a", fontSize: 18, fontWeight: 900, cursor: "pointer", marginTop: 10, boxShadow: "0 10px 24px rgba(0,0,0,0.2)" },
            partialBtn: { background: "rgba(255,255,255,0.03)", border: "2px dashed rgba(255,255,255,0.15)", borderRadius: 14, color: "#a9b1d6", fontSize: 15, fontWeight: 700, padding: "14px", cursor: "pointer", width: "100%", textAlign: "center" },
            partialInput: { flex: 1, padding: "14px 16px", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 17, fontWeight: 800, textAlign: "right", outline: "none" },
            delBtn: { width: 36, height: 36, background: "rgba(231,76,60,0.1)", border: "none", borderRadius: 10, color: "#e74c3c", fontSize: 15, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" },
            editBtn: { padding: "8px 14px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 10, color: "#a9b1d6", fontSize: 14, fontWeight: 800, cursor: "pointer" },
            overlay: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 },
            settingMenuBtn: { display: "flex", alignItems: "center", gap: 12, padding: "16px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 14, color: "#e0e2eb", fontSize: 16, fontWeight: 700, cursor: "pointer", textAlign: "left", width: "100%" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
