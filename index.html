    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
     
        // ─── Firebase 서버 초기화 세팅 ───
        const firebaseConfig = {
          apiKey: "AIzaSyCYjTb8SN-Vq7GoF2LPem_4VRQ8fPb8oFw",
          authDomain: "pp-backup-c0ad2.firebaseapp.com",
          projectId: "pp-backup-c0ad2",
          storageBucket: "pp-backup-c0ad2.firebasestorage.app",
          messagingSenderId: "356643544206",
          appId: "1:356643544206:web:15a5ef0bbd346415d07ddf",
          measurementId: "G-2RJY1LV1MX"

            firebase.initializeApp(firebaseConfig);

        // ─── Constants & Helpers ───
        const MONTHS = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];
        const DAYS = ["일", "월", "화", "수", "목", "금", "토"];
        const KEY = "freelance-tracker-v16"; 
        const COLORS = ["#7aa2f7", "#bb9af7", "#9ece6a", "#e0af68", "#f7768e", "#7dcfff", "#ff9e64", "#73daca"];
          
        const id = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const mk = (y, m) => `${y}-${String(m + 1).padStart(2, "0")}`;
        const won = (n) => (n === 0 ? "0원" : Math.abs(n).toLocaleString("ko-KR") + "원");
        const wonShort = (n) => {
          if (n >= 10000) return Math.floor(n / 10000) + "만";
          if (n >= 1000) return Math.floor(n / 1000) + "천";
          return n.toLocaleString("ko-KR");
        };
          
        const amt = (e) => (e.discount ? -e.amount : e.amount);
        const tag = (e) => (e.discount ? "할인" : e.desc || "작업");
        const fmt = (v) => {
          const n = String(v).replace(/[^0-9]/g, "");
          return n ? parseInt(n, 10).toLocaleString("ko-KR") : "";
        };
        const today = () => {
          const d = new Date();
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        };
          
        // ─── Global Styles & Sandbox Watermark Hider ───
        const GlobalStyle = () => (
          <style>{`
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes popIn { 0% { transform: scale(0.95) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
            @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
            
            .animate-fade { animation: fadeIn 0.25s ease forwards; }
            .animate-pop { animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            .animate-shake { animation: shake 0.4s ease-in-out; }
            
            * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
            body { margin: 0; background: #0f111a; overscroll-behavior-y: none; color: #fff; }
            ::-webkit-scrollbar { display: none; }
            input, select, button { outline: none; font-family: inherit; }
          `}</style>
        );
          
        // ─── Logic Helpers ───
        const sumPaid = (pay, client, excludeKey) => {
          return Object.entries(pay || {}).reduce((total, [key, value]) => {
            if (key.endsWith(`::${client}`)) {
              if (excludeKey && key.startsWith(`${excludeKey}::`)) return total;
              return total + value;
            }
            return total;
          }, 0);
        };
          
        const calcUnpaid = (entries, pay, excludeKey) => {
          const raw = entries.reduce((acc, u) => {
            acc[u.client] = (acc[u.client] || 0) + amt(u);
            return acc;
          }, {});
             
          const out = {};
          Object.entries(raw).forEach(([client, totalAmount]) => {
            const remaining = totalAmount - sumPaid(pay, client, excludeKey);
            if (remaining > 0) out[client] = remaining;
          });
          return out;
        };
          
        const cleanPay = (pay, clientsSet) => {
          const newPay = {};
          Object.entries(pay || {}).forEach(([key, value]) => {
            if (clientsSet.has(key.split("::")[1])) newPay[key] = value;
          });
          return newPay;
        };

        // 데이터가 비정상일 때 앱이 터지지 않도록 무조건 빈 껍데기를 만들어주는 방패 로직
        const sanitizeData = (raw) => {
            if (!raw) return { entries: [], clients: [], payments: {}, pin: null };
            return {
                entries: Array.isArray(raw.entries) ? raw.entries : [],
                clients: Array.isArray(raw.clients) ? raw.clients : [],
                payments: raw.payments || {},
                pin: raw.pin || null
            };
        };
          
        // ─── Lock Screen (PIN Pad) ───
        function LockScreen({ mode, savedPin, onSuccess, onCancel }) {
          const [pin, setPin] = useState("");
          const [error, setError] = useState(false);
             
          useEffect(() => { setPin(""); setError(false); }, [mode]);
             
          const getTitle = () => {
            if (mode === "setup") return "환영합니다!\n사용할 비밀번호를 설정해주세요";
            if (mode === "verify") return "비밀번호를 입력해주세요";
            if (mode === "change_old") return "기존 비밀번호를 입력해주세요";
            if (mode === "change_new") return "새로운 비밀번호를 입력해주세요";
          };
             
          const handlePress = (num) => {
            if (pin.length >= 4) return;
            const newPin = pin + num;
            setPin(newPin);
            setError(false);
             
            if (newPin.length === 4) {
              setTimeout(() => {
                if (mode === "setup" || mode === "change_new") { onSuccess(newPin); } 
                else if (mode === "verify" || mode === "change_old") {
                  if (newPin === savedPin) { onSuccess(newPin); } 
                  else { setError(true); setPin(""); }
                }
              }, 150);
            }
          };
             
          const handleDelete = () => setPin(pin.slice(0, -1));
             
          return (
            <div style={{ position: "fixed", inset: 0, background: "#0f111a", display: "flex", flexDirection: "column", zIndex: 9999 }} className="animate-fade">
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                {onCancel && (
                  <button onClick={onCancel} style={{ position: "absolute", top: "calc(env(safe-area-inset-top) + 24px)", right: 24, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.15)", color: "#a9b1d6", padding: "8px 16px", borderRadius: 12, fontSize: 14, fontWeight: 700, cursor: "pointer", transition: "0.2s" }}>
                    취소
                  </button>
                )}
                <div style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24, boxShadow: "0 10px 30px rgba(122, 162, 247, 0.3)" }}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", textAlign: "center", whiteSpace: "pre-wrap", lineHeight: 1.4, marginBottom: 40 }}>{getTitle()}</div>
                <div className={error ? "animate-shake" : ""} style={{ display: "flex", gap: 20 }}>
                  {[0, 1, 2, 3].map((i) => (
                    <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: i < pin.length ? "#7aa2f7" : "rgba(255,255,255,0.1)", transition: "background 0.2s", boxShadow: i < pin.length ? "0 0 12px rgba(122, 162, 247, 0.6)" : "none" }} />
                  ))}
                </div>
                <div style={{ height: 20, marginTop: 16 }}>{error && <span style={{ color: "#f7768e", fontSize: 14, fontWeight: 600 }}>비밀번호가 일치하지 않습니다.</span>}</div>
              </div>
              <div style={{ padding: "0 24px 60px", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "16px 24px" }}>
                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                  <button key={num} onClick={() => handlePress(num.toString())} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%", transition: "0.2s" }} onPointerDown={(e) => (e.currentTarget.style.background = "rgba(255,255,255,0.05)")} onPointerUp={(e) => (e.currentTarget.style.background = "none")}>{num}</button>
                ))}
                <div /> 
                <button onClick={() => handlePress("0")} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%", transition: "0.2s" }} onPointerDown={(e) => (e.currentTarget.style.background = "rgba(255,255,255,0.05)")} onPointerUp={(e) => (e.currentTarget.style.background = "none")}>0</button>
                <button onClick={handleDelete} style={{ height: 72, background: "none", border: "none", color: "#8a94b5", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "50%", transition: "0.2s" }} onPointerDown={(e) => (e.currentTarget.style.background = "rgba(255,255,255,0.05)")} onPointerUp={(e) => (e.currentTarget.style.background = "none")}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                </button>
              </div>
            </div>
          );
        }
          
        // ─── Shared Components ───
        function QuickBtns({ val, setVal }) {
          return (
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              {[10, 5, 1].map((n) => (
                <button key={n} onClick={() => { const current = parseInt((val || "0").replace(/,/g, ""), 10) || 0; setVal((current + n * 10000).toLocaleString("ko-KR")); }} style={{ flex: 1, padding: "12px 0", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#7aa2f7", fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "0.2s" }} onPointerDown={(e) => (e.currentTarget.style.transform = "scale(0.95)")} onPointerUp={(e) => (e.currentTarget.style.transform = "scale(1)")}>
                  +{n}만
                </button>
              ))}
            </div>
          );
        }

        // ─── Client Management Modal ───
        function ClientManagerModal({ clients, onUpdate, onDelete, onClose }) {
          const [editName, setEditName] = useState(null);
          const [newVal, setNewVal] = useState("");

          return (
            <div style={S.overlay} onClick={onClose}>
               <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 360, background: "#1a1b26"}}>
                  <h3 style={{marginTop:0, marginBottom: 20, fontSize: 20, fontWeight: 900}}>업체 목록 관리</h3>
                  <div style={{maxHeight: "50vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, paddingRight: 5}}>
                    {clients.map(c => (
                      <div key={c} style={{display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.05)", padding: "12px 16px", borderRadius: 14}}>
                        {editName === c ? (
                           <div style={{display: "flex", gap: 8, width: "100%"}}>
                             <input autoFocus value={newVal} onChange={e => setNewVal(e.target.value)} style={{...S.input, padding: "8px 12px", margin: 0, flex: 1, fontSize: 15}} />
                             <button onClick={() => { onUpdate(c, newVal); setEditName(null); }} style={{...S.confirmBtn, padding: "0 14px", borderRadius: 10, flexShrink: 0, whiteSpace: "nowrap", fontSize: 14}}>확인</button>
                           </div>
                        ) : (
                           <>
                             <span style={{fontSize: 16, fontWeight: 800}}>{c}</span>
                             <div style={{display: "flex", gap: 8}}>
                               <button onClick={() => { setEditName(c); setNewVal(c); }} style={{...S.editBtn, padding: "6px 12px", borderRadius: 8}}>수정</button>
                               <button onClick={() => onDelete(c)} style={{...S.delBtn, width: 32, height: 32, borderRadius: 8}}>✕</button>
                             </div>
                           </>
                        )}
                      </div>
                    ))}
                    {clients.length === 0 && <div style={{textAlign: "center", color: "#8a94b5", padding: "30px 0", fontSize: 15}}>등록된 업체가 없습니다.</div>}
                  </div>
                  <button onClick={onClose} style={{...S.submitBtn, marginTop: 20, background: "rgba(255,255,255,0.1)", color: "#fff", padding: "16px 0", borderRadius: 14}}>닫기</button>
               </div>
            </div>
          );
        }

        // ─── 통합 설정 메뉴 모달 ───
        function SettingsModal({ onChangePin, onManageClients, onLogout, onClose }) {
          return (
            <div style={S.overlay} onClick={onClose}>
              <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 320, padding: 24, background: "#1a1b26"}}>
                <h3 style={{marginTop: 0, marginBottom: 20, fontSize: 20, fontWeight: 900, color: "#fff", textAlign: "center"}}>설정</h3>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <button onClick={() => { onClose(); onChangePin(); }} style={S.settingMenuBtn} onPointerDown={(e) => (e.currentTarget.style.transform = "scale(0.97)")} onPointerUp={(e) => (e.currentTarget.style.transform = "scale(1)")}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 
                    비밀번호 변경
                  </button>
                  <button onClick={() => { onClose(); onManageClients(); }} style={S.settingMenuBtn} onPointerDown={(e) => (e.currentTarget.style.transform = "scale(0.97)")} onPointerUp={(e) => (e.currentTarget.style.transform = "scale(1)")}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e0af68" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/></svg>
                    업체 목록 관리
                  </button>
                  <button onClick={() => { onClose(); onLogout(); }} style={{...S.settingMenuBtn, color: "#f7768e"}} onPointerDown={(e) => (e.currentTarget.style.transform = "scale(0.97)")} onPointerUp={(e) => (e.currentTarget.style.transform = "scale(1)")}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f7768e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    로그아웃
                  </button>
                </div>
                <button onClick={onClose} style={{...S.submitBtn, marginTop: 24, background: "rgba(255,255,255,0.05)", color: "#a9b1d6", padding: "14px 0", borderRadius: 14}}>닫기</button>
              </div>
            </div>
          );
        }
          
        function Header({ year, month, onPrev, onNext, onToday, onOpenSettings }) {
          return (
            <div style={{ ...S.header, zIndex: 10 }}>
              <div style={{ width: 44 }} />
              
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <button onClick={onPrev} style={{...S.navBtn, border: "none", background: "none"}}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
                </button>
                <div style={{...S.headerCenter, width: 90}} onClick={onToday}>
                  <span style={{ fontSize: 13, color: "#7a84a6", fontWeight: 700, letterSpacing: 1, marginBottom: 2 }}>{year}년</span>
                  <span style={{ fontSize: 24, fontWeight: 800, color: "#e0e2eb", letterSpacing: 1 }}>{MONTHS[month]}</span>
                </div>
                <button onClick={onNext} style={{...S.navBtn, border: "none", background: "none"}}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>
                </button>
              </div>

              <button onClick={onOpenSettings} style={{...S.navBtn, width: 44, height: 44, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "#a9b1d6"}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
            </div>
          );
        }
          
        function TotalDashboard({ current, unpaid }) {
          return (
            <div style={{ ...S.card, padding: "26px 20px", marginBottom: 24, background: "linear-gradient(145deg, #1f2233 0%, #161824 100%)", border: "1px solid rgba(255,255,255,0.05)", textAlign: "center", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
              <span style={{ fontSize: 14, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>이번 달 총 합계</span>
              <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                <span style={{ fontSize: 34, fontWeight: 900, color: "#fff", letterSpacing: "-1px" }}>{current.toLocaleString("ko-KR")}</span>
                <span style={{ fontSize: 18, fontWeight: 700, color: "#7aa2f7" }}>원</span>
              </div>
              {unpaid > 0 && (
                <div style={{ marginTop: 10, padding: "6px 14px", background: "rgba(224, 175, 104, 0.15)", borderRadius: 12, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 13, color: "#e0af68", fontWeight: 700 }}>+ 미정산 금액</span>
                  <span style={{ fontSize: 14, color: "#e0af68", fontWeight: 900 }}>{unpaid.toLocaleString("ko-KR")}원</span>
                </div>
              )}
            </div>
          );
        }
          
        function Calendar({ year, month, entries, selectedDay, onSelect }) {
          const firstDay = new Date(year, month, 1).getDay();
          const totalDays = new Date(year, month + 1, 0).getDate();
          const now = new Date(); const isNow = now.getFullYear() === year && now.getMonth() === month; const todayDate = now.getDate();
             
          const totals = entries.reduce((acc, e) => { const d = new Date(e.date).getDate(); acc[d] = (acc[d] || 0) + amt(e); return acc; }, {});
          const maxAmt = Math.max(0, ...Object.values(totals).map(Math.abs));
          const cells = [];
             
          DAYS.forEach((d, i) => { cells.push(<div key={`h${i}`} style={{ ...S.calHead, color: i === 0 ? "#f7768e" : i === 6 ? "#7aa2f7" : "#565f89" }}>{d}</div>); });
          for (let i = 0; i < firstDay; i++) { cells.push(<div key={`e${i}`} style={S.calCell} />); }
             
          for (let d = 1; d <= totalDays; d++) {
            const hasData = totals[d] !== undefined; const isSelected = selectedDay === d; const isToday = isNow && todayDate === d; const dow = (firstDay + d - 1) % 7;
            let bgOpacity = 0; if (hasData && maxAmt > 0) bgOpacity = Math.min(1, Math.abs(totals[d]) / maxAmt) * 0.35;
             
            cells.push(

        function PaymentTab({ entries, unpaidMap, currentUnpaidMap, onFullCheck, onPartialPay, onResetPay, monthKey, payments }) {
          const byClient = {};
          entries.forEach((e) => { if (!byClient[e.client]) byClient[e.client] = []; byClient[e.client].push(e); });
          const allClients = [...new Set([...Object.keys(byClient), ...Object.keys(unpaidMap)])];
             
          const rows = allClients.map((client) => {

            return { client, items, thisTotal, unpaid, total, paid, paidAmt, done };
          }).filter(Boolean);

        // ─── [수정됨] 스와이프 다운 애니메이션 재적용 (안전성 강화) ───
        function BottomSheetForm({ clients, onAdd, onNewClient, onClose }) {
          const [client, setClient] = useState(""); const [amount, setAmount] = useState(""); const [desc, setDesc] = useState("");
          const [dateVal, setDateVal] = useState(today()); const [discount, setDiscount] = useState(false);
          const [showNew, setShowNew] = useState(false); const [newName, setNewName] = useState("");
          
          // CSS 애니메이션 충돌 방지를 위한 독립적인 렌더링 상태
          const [isMounted, setIsMounted] = useState(false);
          const [isClosing, setIsClosing] = useState(false);
          const [dragY, setDragY] = useState(0);
          const startY = useRef(null);
          
          // 화면에 렌더링 된 직후 부드럽게 위로 올라오는 효과
          useEffect(() => {
            requestAnimationFrame(() => setIsMounted(true));
          }, []);
          
          // 닫을 때 스르륵 내려가고 나서 완전히 창 끄기
          const triggerClose = () => {
            setIsClosing(true);
            setTimeout(onClose, 250); 
          };
          
          const onTouchStart = (e) => { startY.current = e.touches[0].clientY; };
          const onTouchMove = (e) => {
            if (startY.current === null || isClosing) return;
            const diff = e.touches[0].clientY - startY.current;
            if (diff > 0) setDragY(diff);
          };
          const onTouchEnd = () => {
            if (isClosing) return;
            if (dragY > 100) triggerClose(); // 아래로 많이 내렸으면 닫기
            else setDragY(0); // 조금만 내렸으면 원위치

                <button onClick={submit} disabled={!client || !amount} style={{ ...S.submitBtn, opacity: client && amount ? 1 : 0.3, background: discount ? "linear-gradient(135deg, #f7768e 0%, #ff9e64 100%)" : "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", width: "100%" }}>

        // ─── 실제 동작 앱 컴포넌트 ───
        function MainApp({ data, persist, user }) {
          const [pinState, setPinState] = useState(data.pin ? "verify" : "unlocked");
          const [vY, setVY] = useState(() => new Date().getFullYear());
          const [vM, setVM] = useState(() => new Date().getMonth());
          const [tab, setTab] = useState("summary");
          const [del, setDel] = useState(null);
          const [showAdd, setShowAdd] = useState(false);
          const [showClientManager, setShowClientManager] = useState(false);
          const [showSettings, setShowSettings] = useState(false);
             
          useEffect(() => {
            const handleVisibilityChange = () => {
              if (document.visibilityState === "hidden" && data.pin) {
                setPinState("verify");
              }
            };
            document.addEventListener("visibilitychange", handleVisibilityChange);
            return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
          }, [data.pin]);

          const handlePinSuccess = (enteredPin) => {
            if (pinState === "setup" || pinState === "change_new") {
              persist({ ...data, pin: enteredPin });
              setPinState("unlocked");
            } else if (pinState === "verify") {
              setPinState("unlocked");
            } else if (pinState === "change_old") {
              setPinState("change_new");
            }
          };

          const onUpdateClient = (oldName, newName) => {
            if (oldName === newName || !newName.trim() || data.clients.includes(newName)) return;
            const newClients = data.clients.map(c => c === oldName ? newName : c);
            const newEntries = data.entries.map(e => e.client === oldName ? { ...e, client: newName } : e);
            const newPayments = {};
            Object.entries(data.payments || {}).forEach(([k, v]) => {
              if (k.endsWith(`::${oldName}`)) {
                newPayments[k.replace(`::${oldName}`, `::${newName}`)] = v;
              } else {
                newPayments[k] = v;
              }
            });
            persist({ ...data, clients: newClients, entries: newEntries, payments: newPayments });
          };

          const onDeleteClient = (name) => {
            if (!confirm(`'${name}' 업체를 목록에서 삭제할까요?\n(기존에 등록된 작업 기록은 지워지지 않고 유지됩니다)`)) return;
            const newClients = data.clients.filter(c => c !== name);
            persist({ ...data, clients: newClients });
          };
             
          if (pinState !== "unlocked") {
            return <LockScreen mode={pinState} savedPin={data.pin} onSuccess={handlePinSuccess} onCancel={pinState.startsWith("change_") ? () => setPinState("unlocked") : null} />;
          }
             
          const curMk = mk(vY, vM);
          const monthEntries = data.entries.filter((e) => { const d = new Date(e.date); return d.getFullYear() === vY && d.getMonth() === vM; });
          const unpaidEntries = data.entries.filter((e) => { const d = new Date(e.date); return mk(d.getFullYear(), d.getMonth()) < curMk && !e.paid; });
             
          const initialUnpaidMap = calcUnpaid(unpaidEntries, data.payments, curMk);
          const currentUnpaidMap = calcUnpaid(unpaidEntries, data.payments);
             
          const onAdd = (entry) => { persist({ ...data, entries: [...data.entries, { ...entry, id: id(), paid: false }] }); };
          const onNewClient = (name) => { if (!data.clients.includes(name)) persist({ ...data, clients: [...data.clients, name] }); };
          const onPartialPay = (client, key, amount) => { const pk = `${key}::${client}`; persist({ ...data, payments: { ...data.payments, [pk]: ((data.payments || {})[pk] || 0) + amount } }); };
          const onResetPay = (client) => { const newPay = { ...(data.payments || {}) }; delete newPay[`${curMk}::${client}`]; persist({ ...data, payments: newPay }); };
          
          const onFullCheck = (client, key, check, unpaidAmt) => {
            let ent = data.entries; let pay = { ...(data.payments || {}) }; const pk = `${key}::${client}`;
            if (check) {
              ent = ent.map((e) => { const d = new Date(e.date); return e.client === client && mk(d.getFullYear(), d.getMonth()) === key ? { ...e, paid: true } : e; });
              if (unpaidAmt > 0) pay[pk] = unpaidAmt;
            } else {
              ent = ent.map((e) => { const d = new Date(e.date); return e.client === client && mk(d.getFullYear(), d.getMonth()) === key ? { ...e, paid: false } : e; });
              delete pay[pk];
            }
            persist({ ...data, entries: ent, payments: pay });
          };
             
          const onDelete = (entry) => {
            const ent = data.entries.filter((e) => e.id !== entry.id);
            persist({ ...data, entries: ent, payments: cleanPay(data.payments, new Set(ent.map((e) => e.client))) });
            setDel(null);
          };
          const onEditAmt = (id, a) => { persist({ ...data, entries: data.entries.map((e) => (e.id === id ? { ...e, amount: a } : e)) }); };
             
          const prev = () => { if (vM === 0) { setVY(vY - 1); setVM(11); } else { setVM(vM - 1); } };
          const next = () => { if (vM === 11) { setVY(vY + 1); setVM(0); } else { setVM(vM + 1); } };
          const goToday = () => { const n = new Date(); setVY(n.getFullYear()); setVM(n.getMonth()); };
             
          return (
            <div style={S.app}>
              <GlobalStyle />
              
              <Header year={vY} month={vM} onPrev={prev} onNext={next} onToday={goToday} onOpenSettings={() => setShowSettings(true)} />
             
              <div style={{ padding: "0 20px 140px" }}>
                {tab === "summary" && <SummaryTab entries={monthEntries} unpaidMap={currentUnpaidMap} year={vY} month={vM} onDelete={setDel} onEditAmount={onEditAmt} />}
                {tab === "payment" && <PaymentTab entries={monthEntries} unpaidMap={initialUnpaidMap} currentUnpaidMap={currentUnpaidMap} onFullCheck={onFullCheck} onPartialPay={onPartialPay} onResetPay={onResetPay} monthKey={curMk} payments={data.payments || {}} />}
              </div>
             
              <div style={{ position: "fixed", bottom: "max(24px, env(safe-area-inset-bottom))", left: 20, right: 20, maxWidth: 440, margin: "0 auto", height: 76, background: "rgba(26, 27, 38, 0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderRadius: 38, border: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 10px", zIndex: 30, boxShadow: "0 24px 48px rgba(0,0,0,0.5)" }}>
                <button onClick={() => setTab("summary")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>
                  {tab === "summary" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab === "summary" ? "#7aa2f7" : "#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><path d="M3 9h18" /><path d="M9 21V9" /></svg>
                  <span style={{ fontSize: 13, fontWeight: tab === "summary" ? 900 : 700, color: tab === "summary" ? "#7aa2f7" : "#565f89" }}>정산</span>
                </button>
             
                <button onClick={() => setShowAdd(true)} style={{ width: 62, height: 62, borderRadius: "50%", background: "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", color: "#0f111a", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transform: "translateY(-16px)", boxShadow: "0 12px 28px rgba(122, 162, 247, 0.4)", transition: "0.2s" }} onPointerDown={(e) => (e.currentTarget.style.transform = "translateY(-14px) scale(0.95)")} onPointerUp={(e) => (e.currentTarget.style.transform = "translateY(-16px) scale(1)")}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
                </button>
             
                <button onClick={() => setTab("payment")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>
                  {tab === "payment" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab === "payment" ? "#9ece6a" : "#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></svg>
                  <span style={{ fontSize: 13, fontWeight: tab === "payment" ? 900 : 700, color: tab === "payment" ? "#9ece6a" : "#565f89" }}>입금</span>
                </button>
              </div>
             
              {showSettings && <SettingsModal onChangePin={() => setPinState("change_old")} onManageClients={() => setShowClientManager(true)} onLogout={() => auth.signOut()} onClose={() => setShowSettings(false)} />}
              {showClientManager && <ClientManagerModal clients={data.clients} onUpdate={onUpdateClient} onDelete={onDeleteClient} onClose={() => setShowClientManager(false)} />}
              {showAdd && <BottomSheetForm clients={data.clients} onAdd={onAdd} onNewClient={onNewClient} onClose={() => setShowAdd(false)} />}
              <DeleteModal entry={del} onConfirm={() => onDelete(del)} onCancel={() => setDel(null)} />
            </div>
          );
        }

        // ─── 인증 & 데이터 로딩 껍데기 ───
        function App() {
            const [user, setUser] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (u) {
                        setUser(u);
                        db.collection('users').doc(u.uid).get().then(doc => {
                            if (doc.exists) {
                                // 기존 데이터가 깨져도 안전하게 복구
                                setData(sanitizeData(doc.data()));
                            } else {
                                const localRaw = localStorage.getItem(KEY);
                                let defaultData = { entries: [], clients: [], payments: {}, pin: null };
                                if (localRaw) { 
                                    try { 
                                        const parsed = JSON.parse(localRaw);
                                        if (parsed) defaultData = sanitizeData(parsed);
                                    } catch(e) {} 
                                }
                                setData(defaultData);
                                db.collection('users').doc(u.uid).set(defaultData);
                            }
                            setLoading(false);
                        }).catch(err => {
                            alert("데이터베이스 연결 실패! Firestore 데이터베이스를 만들었는지 확인해주세요.");
                            auth.signOut();
                            setLoading(false);
                        });
                    } else {
                        setUser(null);
                        setData(null);
                        setLoading(false);
                    }
                });
                return unsubscribe;
            }, []);

            const persist = useCallback((newData) => {
                setData(newData);
                if (user) {
                    db.collection('users').doc(user.uid).set(newData).catch(console.error);
                }
            }, [user]);

            if (loading) return <div style={S.overlay}><div style={{color:"#fff", fontSize: 18, fontWeight: 800}}>서버 연결 중...</div></div>;

            if (!user) {
                return (
                    <div style={{...S.overlay, background: "#0f111a", flexDirection: "column", padding: 30, textAlign: "center"}}>
                        <div style={{width: 80, height: 80, borderRadius: 24, background: "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 30, boxShadow: "0 15px 35px rgba(122,162,247,0.3)"}}>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <h1 style={{fontSize: 26, fontWeight: 900, color: "#fff", marginBottom: 10}}>정산기 Pro 클라우드</h1>
                        <p style={{fontSize: 15, color: "#8a94b5", lineHeight: 1.5, marginBottom: 40, wordBreak: "keep-all"}}>
                            데이터가 서버에 안전하게 자동 저장됩니다.<br/>폰을 바꾸거나 방문 기록을 지워도 안심하세요!
                        </p>
                        <button onClick={() => auth.signInWithPopup(provider)} style={{...S.submitBtn, display: "flex", alignItems: "center", justifyContent: "center", gap: 12, background: "#fff", color: "#111", padding: "16px 0", borderRadius: 16}}>
                            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            구글 계정으로 시작하기
                        </button>
                    </div>
                );
            }

            return <MainApp data={data} persist={persist} user={user} />;
        }
          
        // ─── Styles ───
        const S = {
          app: { background: "#0f111a", minHeight: "100vh", color: "#e8e8ed", maxWidth: 480, margin: "0 auto", position: "relative" },
          header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "calc(env(safe-area-inset-top) + 20px) 20px 24px", background: "transparent" },
          navBtn: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 14, color: "#8a94b5", width: 48, height: 48, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "0.2s", flexShrink: 0 },
          headerCenter: { display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer" },
          card: { background: "rgba(36, 40, 59, 0.4)", borderRadius: 24, border: "1px solid rgba(255,255,255,0.03)" },
          calGrid: { display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 },
          calHead: { textAlign: "center", fontSize: 13, fontWeight: 800, padding: "8px 0", color: "#565f89" },
          calCell: { display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 2px", minHeight: 60 },
          empty: { textAlign: "center", color: "#565f89", padding: "80px 0", fontSize: 16, fontWeight: 700 },
          field: { marginBottom: 24 },
          row: { display: "flex", gap: 12 },
          select: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none", appearance: "none" },
          plusBtn: { width: 54, height: 54, borderRadius: 14, fontSize: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: "none", fontWeight: 300, transition: "0.2s" },
          confirmBtn: { padding: "0 20px", background: "#7aa2f7", border: "none", borderRadius: 14, color: "#0f111a", fontSize: 16, fontWeight: 900, cursor: "pointer" },
          input: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none" },
          submitBtn: { width: "100%", padding: "20px 0", border: "none", borderRadius: 18, color: "#0f111a", fontSize: 18, fontWeight: 900, cursor: "pointer", marginTop: 10, boxShadow: "0 10px 24px rgba(0,0,0,0.2)", transition: "0.2s" },
          partialBtn: { background: "rgba(255,255,255,0.03)", border: "2px dashed rgba(255,255,255,0.15)", borderRadius: 14, color: "#a9b1d6", fontSize: 15, fontWeight: 700, padding: "14px", cursor: "pointer", width: "100%", textAlign: "center" },
          partialInput: { flex: 1, padding: "14px 16px", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 17, fontWeight: 800, textAlign: "right", outline: "none" },
          delBtn: { width: 36, height: 36, background: "rgba(231, 76, 60, 0.1)", border: "none", borderRadius: 10, color: "#e74c3c", fontSize: 15, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" },
          editBtn: { padding: "8px 14px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 10, color: "#a9b1d6", fontSize: 14, fontWeight: 800, cursor: "pointer" },
          overlay: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 },
          settingMenuBtn: { display: "flex", alignItems: "center", gap: 12, padding: "16px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 14, color: "#e0e2eb", fontSize: 16, fontWeight: 700, cursor: "pointer", transition: "0.2s", textAlign: "left", width: "100%" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
