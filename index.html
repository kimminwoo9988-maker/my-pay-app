<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>프리랜서 정산기 Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin: 0; background: #0f111a; touch-action: manipulation;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
     
        // ─── Firebase 초기화 ───
        const firebaseConfig = {
          apiKey: "AIzaSyCYjTb8SN-Vq7GoF2LPem_4VRQ8fPb8oFw",
          authDomain: "pp-backup-c0ad2.firebaseapp.com",
          projectId: "pp-backup-c0ad2",
          storageBucket: "pp-backup-c0ad2.firebasestorage.app",
          messagingSenderId: "356643544206",
          appId: "1:356643544206:web:15a5ef0bbd346415d07ddf",
          measurementId: "G-2RJY1LV1MX"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // ─── Helpers ───
        const MONTHS = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];
        const DAYS = ["일", "월", "화", "수", "목", "금", "토"];
        const KEY = "freelance-tracker-v27"; 
        const COLORS = ["#7aa2f7", "#bb9af7", "#9ece6a", "#e0af68", "#f7768e", "#7dcfff", "#ff9e64", "#73daca"];
          
        const id = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const mk = (y, m) => `${y}-${String(m + 1).padStart(2, "0")}`;
        const won = (n) => (n === 0 ? "0" : Math.abs(n).toLocaleString("ko-KR")); // 숫자만 깔끔하게 (원 표기 제외)
        const amt = (e) => (e.discount ? -e.amount : e.amount);
        const tag = (e) => (e.discount ? "할인" : e.desc || "작업");
        const fmt = (v) => { const n = String(v).replace(/[^0-9]/g, ""); return n ? parseInt(n, 10).toLocaleString("ko-KR") : ""; };
        const today = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };

        const sanitizeData = (raw) => {
            if (!raw) return { entries: [], clients: [], payments: {}, pin: null };
            const validEntries = Array.isArray(raw.entries) ? raw.entries.filter(e => e && e.client && e.date) : [];
            const uniqueEntries = Array.from(new Map(validEntries.map(e => [e.id, e])).values());
            return { entries: uniqueEntries, clients: Array.isArray(raw.clients) ? raw.clients : [], payments: raw.payments || {}, pin: raw.pin || null };
        };
          
        // ─── Global Styles ───
        const GlobalStyle = () => (
          <style>{`
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes popIn { 0% { transform: scale(0.95) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
            @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
            .animate-slide { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            .animate-fade { animation: fadeIn 0.25s ease forwards; }
            .animate-pop { animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            .animate-shake { animation: shake 0.4s ease-in-out; }
            * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
            body { margin: 0; background: #0f111a; overscroll-behavior-y: none; color: #fff; overflow: hidden; }
            ::-webkit-scrollbar { display: none; }
            input, select, button { outline: none; font-family: inherit; }
          `}</style>
        );

        // ─── Logic ───
        const calcBalance = (entries, payments, excludeMkStart) => {
          const bal = {};
          (entries || []).forEach(e => {
            const d = new Date(e.date); const eMk = mk(d.getFullYear(), d.getMonth());
            if (excludeMkStart && eMk >= excludeMkStart) return;
            if (!e.paid) bal[e.client] = (bal[e.client] || 0) + amt(e);
          });
          Object.entries(payments || {}).forEach(([pk, val]) => {
            const parts = pk.split("::"); if(parts.length !== 2) return;
            const pMk = parts[0]; const client = parts[1];
            if (excludeMkStart && pMk >= excludeMkStart) return;
            bal[client] = (bal[client] || 0) - val;
          });
          const out = {};
          Object.entries(bal).forEach(([c, v]) => { if (v !== 0) out[c] = v; });
          return out;
        };

        const getDDay = (deadline) => {
          if (!deadline) return null;
          const target = new Date(deadline).setHours(0,0,0,0);
          const now = new Date().setHours(0,0,0,0);
          const diff = Math.floor((target - now) / (1000 * 60 * 60 * 24));
          return diff;
        };

        // ─── Lock Screen ───
        function LockScreen({ mode, savedPin, onSuccess, onCancel }) {
          const [pin, setPin] = useState(""); const [error, setError] = useState(false);
          useEffect(() => { setPin(""); setError(false); }, [mode]);
          const handlePress = (num) => {
            if (pin.length >= 4) return;
            const newPin = pin + num; setPin(newPin); setError(false);
            if (newPin.length === 4) {
              setTimeout(() => {
                if (mode === "setup" || mode === "change_new") onSuccess(newPin); 
                else if (mode === "verify" || mode === "change_old") {
                  if (newPin === savedPin) onSuccess(newPin); else { setError(true); setPin(""); }
                }
              }, 150);
            }
          };
          return (
            <div style={{ position: "fixed", inset: 0, background: "#0f111a", display: "flex", flexDirection: "column", zIndex: 9999 }} className="animate-fade">
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                {onCancel && <button onClick={onCancel} style={S.cancelPinBtn}>취소</button>}
                <div style={S.lockIcon}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
                <div style={S.lockTitle}>{mode === "setup" ? "비밀번호 설정" : "비밀번호 입력"}</div>
                <div className={error ? "animate-shake" : ""} style={{ display: "flex", gap: 20 }}>
                  {[0, 1, 2, 3].map((i) => <div key={i} style={{ ...S.pinDot, background: i < pin.length ? "#7aa2f7" : "rgba(255,255,255,0.1)", boxShadow: i < pin.length ? "0 0 12px #7aa2f7" : "none" }} />)}
                </div>
                <div style={{ height: 20, marginTop: 16 }}>{error && <span style={{ color: "#f7768e", fontSize: 14, fontWeight: 600 }}>비밀번호가 일치하지 않습니다.</span>}</div>
              </div>
              <div style={S.keypad}>
                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => <button key={num} onClick={() => handlePress(num.toString())} style={S.keyBtn}>{num}</button>)}
                <div /> <button onClick={() => handlePress("0")} style={S.keyBtn}>0</button>
                <button onClick={() => setPin(pin.slice(0, -1))} style={S.keyBtn}>✕</button>
              </div>
            </div>
          );
        }

        // ─── Dashboard Components ───
        function TotalDashboard({ current, unpaidMap }) {
          let sumUnpaid = 0; let sumPrepaid = 0;
          Object.values(unpaidMap || {}).forEach(v => { if (v > 0) sumUnpaid += v; else if (v < 0) sumPrepaid += Math.abs(v); });
          const finalTotal = (current || 0) + sumUnpaid - sumPrepaid;
          return (
            <div style={{ ...S.card, padding: "26px 20px", marginBottom: 24, background: "linear-gradient(145deg, #1f2233 0%, #161824 100%)", textAlign: "center" }}>
              <span style={{ fontSize: 14, color: "#8a94b5", fontWeight: 700 }}>이번 달 최종 정산액</span>
              <div style={{ display: "flex", alignItems: "baseline", gap: 4, justifyContent: "center", marginTop: 8 }}>
                <span style={{ fontSize: 34, fontWeight: 900, color: finalTotal < 0 ? "#9ece6a" : "#fff" }}>{finalTotal < 0 ? "-" : ""}{Math.abs(finalTotal).toLocaleString()}</span>
                <span style={{ fontSize: 18, fontWeight: 700, color: finalTotal < 0 ? "#9ece6a" : "#7aa2f7" }}>원</span>
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 14 }}>
                {sumUnpaid > 0 && <div style={S.sumChipRed}>미정산 이월 +{sumUnpaid.toLocaleString()}</div>}
                {sumPrepaid > 0 && <div style={S.sumChipGreen}>선지급 차감 -{sumPrepaid.toLocaleString()}</div>}
              </div>
            </div>
          );
        }

        function SummaryTab({ entries, unpaidMap, year, month, onDelete, onEditEntry }) {
          const [openClient, setOpenClient] = useState(null);
          const [receiptClient, setReceiptClient] = useState(null);
          const [editId, setEditId] = useState(null);
          const [editAmt, setEditAmt] = useState("");
          const [editDesc, setEditDesc] = useState("");
              
          const groups = {};
          (entries || []).forEach((e) => {
            if (!groups[e.client]) groups[e.client] = { total: 0, items: [] };
            groups[e.client].total += amt(e); groups[e.client].items.push(e);
          });
          const allClients = [...new Set([...Object.keys(groups), ...Object.keys(unpaidMap || {})])];
          const deadlines = entries.filter(e => e.deadline && !e.paid).sort((a,b) => new Date(a.deadline) - new Date(b.deadline));

          return (
            <div className="animate-fade">
              <TotalDashboard current={(entries||[]).reduce((s, e) => s + amt(e), 0)} unpaidMap={unpaidMap} />
              
              {deadlines.length > 0 && (
                <div style={S.deadlineSection}>
                  <div style={{fontSize: 14, fontWeight: 800, color: "#f7768e", marginBottom: 12, display: "flex", alignItems: "center", gap: 6}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    다가오는 마감일
                  </div>
                  <div style={{display: "flex", gap: 10, overflowX: "auto", paddingBottom: 4}}>
                    {deadlines.map(e => {
                      const dday = getDDay(e.deadline);
                      return (
                        <div key={e.id} style={S.deadlineCard}>
                          <div style={{fontSize: 12, fontWeight: 700, color: dday <= 0 ? "#f7768e" : "#e0af68"}}>{dday === 0 ? "D-Day (오늘)" : dday < 0 ? `${Math.abs(dday)}일 지남` : `D-${dday}`}</div>
                          <div style={{fontSize: 14, fontWeight: 800, marginTop: 4, whiteSpace: "nowrap"}}>{e.client}</div>
                          <div style={{fontSize: 12, color: "#8a94b5", marginTop: 2, textOverflow: "ellipsis", overflow: "hidden"}}>{e.desc || "작업"}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {allClients.map((name, i) => {
                  const g = groups[name]; const un = (unpaidMap || {})[name] || 0; const total = (g ? g.total : 0) + un;
                  if (total === 0 && !g) return null; 
                  const c = COLORS[i % 8]; const isOpen = openClient === name;
                  return (
                    <div key={name} style={{ ...S.clientRow, borderLeft: `4px solid ${c}`, background: isOpen ? "rgba(36, 40, 59, 0.9)" : "rgba(36, 40, 59, 0.4)" }}>
                      <div onClick={() => setOpenClient(isOpen ? null : name)} style={S.clientHeader}>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 16, fontWeight: 800 }}>{name}</span>
                            {un > 0 && <span style={S.badgeRed}>미정산</span>}
                            {un < 0 && <span style={S.badgeGreen}>선지급</span>}
                          </div>
                          {g && <div style={{ fontSize: 12, color: "#565f89", marginTop: 4 }}>{g.items.length}건의 작업</div>}
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 17, fontWeight: 900, color: total < 0 ? "#9ece6a" : "#fff" }}>{total < 0 ? `+${won(Math.abs(total))}` : won(total)}원</div>
                          <div style={{ fontSize: 11, color: "#565f89", marginTop: 2 }}>{isOpen ? "닫기 ▲" : "상세 ▼"}</div>
                        </div>
                      </div>
                      {isOpen && (
                        <div className="animate-slide" style={{ padding: "0 16px 16px" }}>
                          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
                            <button onClick={() => setReceiptClient(name)} style={S.receiptBtn}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg> 정산서 (Invoice) 보기</button>
                          </div>
                          {g?.items.map((e) => (
                            <div key={e.id} style={S.itemRow}>
                              {editId === e.id ? (
                                <div style={{ display: "flex", gap: 6, width: "100%" }}>
                                  <input value={editDesc} onChange={(ev) => setEditDesc(ev.target.value)} style={S.editInput} />
                                  <input value={editAmt} onChange={(ev) => setEditAmt(fmt(ev.target.value))} style={{ ...S.editInput, width: 80, textAlign: "right" }} />
                                  <button onClick={() => { onEditEntry(e.id, parseInt(editAmt.replace(/,/g,"")), editDesc); setEditId(null); }} style={S.editOkBtn}>확인</button>
                                </div>
                              ) : (
                                <div style={{ display: "flex", justifyContent: "space-between", width: "100%" }}>
                                  <div>
                                    <div style={{ fontSize: 14, fontWeight: 600 }}>{tag(e)}</div>
                                    {e.deadline && <div style={{fontSize: 11, color: "#f7768e", marginTop: 2}}>마감: {e.deadline}</div>}
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ fontSize: 15, fontWeight: 800 }}>{e.discount ? "-" : ""}{won(e.amount)}원</span>
                                    <button onClick={() => { setEditId(e.id); setEditAmt(e.amount.toLocaleString()); setEditDesc(e.desc||""); }} style={S.iconBtn}>✎</button>
                                    <button onClick={() => onDelete(e)} style={S.iconBtn}>✕</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {receiptClient && <ReceiptModal client={receiptClient} month={month} year={year} items={groups[receiptClient]?.items || []} unpaid={(unpaidMap || {})[receiptClient] || 0} onClose={() => setReceiptClient(null)} />}
            </div>
          );
        }

        // ─── ✨ 완벽히 구현된 영수증 모달 (이미지 기반) ───
        function ReceiptModal({ client, month, year, items, unpaid, onClose }) {
          const [isProcessing, setIsProcessing] = useState(false);
          const currentTotal = items.reduce((s, e) => s + amt(e), 0);
          const finalTotal = currentTotal + unpaid;
          const d = new Date(); const todayStr = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
              
          const copyText = async () => {
            const lines = [`[Invoice] ${client}`, `발행일: ${todayStr}`, ""];
            items.forEach(e => lines.push(`- ${tag(e)} : ${e.discount ? "-" : ""}${won(e.amount)}원`));
            if (unpaid > 0) lines.push(`\n미정산 이월: ${won(unpaid)}원`); 
            if (unpaid < 0) lines.push(`\n선지급 차감: -${won(Math.abs(unpaid))}원`); 
            lines.push(`\n총 청구액: ${finalTotal < 0 ? "0" : won(finalTotal)}원`);
            try { await navigator.clipboard.writeText(lines.join("\n")); alert("내역 텍스트가 복사되었습니다!"); } catch { alert("복사 불가 기기입니다."); }
          };
              
          const generateImageBlob = async () => {
            if (!window.html2canvas) {
              await new Promise((res) => { const s = document.createElement("script"); s.src = "https://html2canvas.hertzen.com/dist/html2canvas.min.js"; s.onload = res; document.head.appendChild(s); });
            }
            const el = document.getElementById("receipt-capture-area");
            const canvas = await window.html2canvas(el, { backgroundColor: "#fcfbf9", scale: 3, useCORS: true });
            return new Promise(res => canvas.toBlob(res, "image/png"));
          };
              
          const saveImage = async () => {
            setIsProcessing(true);
            try { const b = await generateImageBlob(); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.download = `Invoice_${client}.png`; a.href = u; a.click(); URL.revokeObjectURL(u); } 
            catch { alert("저장 실패"); } finally { setIsProcessing(false); }
          };
              
          const shareImage = async () => {
            setIsProcessing(true);
            try {
              const b = await generateImageBlob(); const f = new File([b], `Invoice_${client}.png`, { type: "image/png" });
              if (navigator.canShare && navigator.canShare({ files: [f] })) { await navigator.share({ files: [f] }); } 
              else { alert("공유 불가 기기입니다. 텍스트 복사나 저장을 이용해주세요."); }
            } catch (e) { if (e.name !== "AbortError") alert("공유 중 오류"); } finally { setIsProcessing(false); }
          };
              
          return (
            <div style={S.overlay} onClick={onClose}>
              <div className="animate-pop" onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 600, display: "flex", flexDirection: "column", gap: 16 }}>
                
                {/* 📝 이미지 기반 깔끔한 인보이스 UI 영역 */}
                <div id="receipt-capture-area" style={{ background: "#fcfbf9", padding: "40px 32px", color: "#111", fontFamily: "'Pretendard', sans-serif", position: "relative", borderRadius: 8 }}>
                  <h1 style={{ fontSize: 32, fontWeight: 900, margin: "0 0 30px 0", color: "#111" }}>Estimate.</h1>
                  
                  {/* 상단 4단 그리드 헤더 */}
                  <div style={{ display: "grid", gridTemplateColumns: "1.2fr 0.8fr 1fr 1.5fr", borderBottom: "1px solid #ddd", paddingBottom: 10, marginBottom: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 800 }}>Provider info.</div>
                    <div style={{ fontSize: 13, fontWeight: 800 }}>Date</div>
                    <div style={{ fontSize: 13, fontWeight: 800 }}>Client info.</div>
                    <div style={{ fontSize: 13, fontWeight: 800, textAlign: "right" }}>Total</div>
                  </div>
                  
                  {/* 상단 데이터 */}
                  <div style={{ display: "grid", gridTemplateColumns: "1.2fr 0.8fr 1fr 1.5fr", alignItems: "start", borderBottom: "1px solid #ddd", paddingBottom: 20, marginBottom: 30 }}>
                    <div style={{ fontSize: 14, color: "#333" }}>김민우</div>
                    <div style={{ fontSize: 14, color: "#333" }}>{todayStr}</div>
                    <div style={{ fontSize: 20, fontWeight: 900, color: "#111", wordBreak: "keep-all" }}>{client}</div>
                    <div style={{ fontSize: 32, fontWeight: 900, textAlign: "right", letterSpacing: "-1px" }}>{finalTotal < 0 ? "0" : won(finalTotal)}</div>
                  </div>
                  
                  {/* 내용 테이블 헤더 */}
                  <div style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid #ddd", paddingBottom: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, flex: 1 }}>Contents</div>
                    <div style={{ fontSize: 13, fontWeight: 800, width: 120, textAlign: "right" }}>Sum</div>
                  </div>
                  
                  {/* 작업 내역들 */}
                  <div style={{ minHeight: 120 }}>
                    {items.map(e => (
                      <div key={e.id} style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#111" }}>{tag(e)}</div>
                        <div style={{ fontSize: 14, fontWeight: 800 }}>{e.discount ? "-" : ""}{won(e.amount)}</div>
                      </div>
                    ))}
                    {unpaid > 0 && (
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#d35400" }}>미정산 이월</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: "#d35400" }}>{won(unpaid)}</div>
                      </div>
                    )}
                    {unpaid < 0 && (
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#27ae60" }}>선지급 차감</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: "#27ae60" }}>-{won(Math.abs(unpaid))}</div>
                      </div>
                    )}
                  </div>
                  
                  {/* 하단 최종 합계 (소계, V.A.T 제거) */}

                  {/* 문구 및 계좌정보 (수정됨) */}

                    <strong style={{color:"#555"}}>계좌안내 : [은행명] [계좌번호] (예금주: 김민우)</strong><br/>
                    청구 외 사항이 추가 시 수정 청구서로 재발급합니다.
                  </div>
                  
                  <div style={{ position: "absolute", bottom: 35, right: 32, fontSize: 12, fontWeight: 800, letterSpacing: 2, color: "#333" }}>
                    K I M · M I N W O O
                  </div>

                {/* 📝 영역 끝 */}

                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={saveImage} disabled={isProcessing} style={S.actionBtnBlue}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg> 이미지 저장</button>
                    <button onClick={shareImage} disabled={isProcessing} style={S.actionBtnGreen}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 카톡 공유</button>
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={copyText} style={S.actionBtnDark}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 텍스트 복사</button>
                    <button onClick={onClose} style={S.actionBtnDark}>닫기</button>
                  </div>
                </div>
              </div>
            </div>
          );
        }
          
        function BottomSheetForm({ clients, onAdd, onNewClient, onClose }) {
          const [client, setClient] = useState(""); const [amount, setAmount] = useState(""); const [desc, setDesc] = useState("");
          const [dateVal, setDateVal] = useState(today()); 
          const [deadline, setDeadline] = useState(""); const [useDeadline, setUseDeadline] = useState(false);
          const [discount, setDiscount] = useState(false);
          const [showNew, setShowNew] = useState(false); const [newName, setNewName] = useState("");
          const [isSubmitting, setIsSubmitting] = useState(false);
              
          const submit = () => {
            if (isSubmitting) return; 
            if (!client || !amount) return; 
            const raw = parseInt(amount.replace(/,/g, ""), 10); 
            if (isNaN(raw) || raw <= 0) return;
            
            setIsSubmitting(true);
            const [y, m, d] = dateVal.split("-").map(Number);
            onAdd({ client, amount: raw, desc: discount ? "" : desc.trim(), date: new Date(y, m - 1, d, 12).toISOString(), deadline: useDeadline ? deadline : null, discount });
            setTimeout(() => { setIsSubmitting(false); onClose(); }, 100);
          };
          const addC = () => { if (!newName.trim()) return; onNewClient(newName.trim()); setClient(newName.trim()); setNewName(""); setShowNew(false); };
              
          return (
            <div style={{ ...S.overlay, alignItems: "flex-end", padding: 0 }} onClick={onClose}>
              <div className="animate-slide" onClick={(e) => e.stopPropagation()} style={S.bottomSheet}>
                {/* ✨ 닫기 버튼 추가 (스와이프 대체) */}
                <div style={S.sheetHeader}>
                   <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>새 작업 기록</div>
                   <button onClick={onClose} style={S.closeBtn}>✕</button>
                </div>
              
                <div style={{ ...S.field, width: "100%", boxSizing: "border-box" }}>
                  <div style={{ display: "flex", gap: 10, width: "100%" }}>
                    <input type="date" value={dateVal} onChange={(e) => setDateVal(e.target.value)} style={{ ...S.input, colorScheme: "dark", flex: 1, minWidth: 0, padding: "14px 12px" }} />
                    {!showNew && (
                      <select value={client} onChange={(e) => setClient(e.target.value)} style={{ ...S.select, flex: 1.5, minWidth: 0, padding: "14px 12px" }}>
                        <option value="">업체 선택</option>
                        {(clients||[]).map((c) => (<option key={c} value={c}>{c}</option>))}
                      </select>
                    )}
                    {showNew && <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="새 업체명" style={{ ...S.input, flex: 1.5, minWidth: 0, padding: "14px 12px" }} onKeyDown={(e) => e.key === "Enter" && addC()} autoFocus />}
                    {showNew ? <button onClick={addC} style={{ ...S.confirmBtn, flexShrink: 0, whiteSpace: "nowrap", padding: "0 16px" }}>추가</button> : <button onClick={() => setShowNew(true)} style={{ ...S.plusBtn, flexShrink: 0, width: 52 }}>+</button>}
                    {showNew && <button onClick={() => setShowNew(false)} style={{ ...S.plusBtn, flexShrink: 0, width: 52 }}>✕</button>}
                  </div>
                </div>
              
                <div style={{ ...S.field, width: "100%", boxSizing: "border-box" }}>
                  <div style={{ display: "flex", alignItems: "center", background: "rgba(0,0,0,0.2)", borderRadius: 18, border: "1px solid rgba(255,255,255,0.05)", padding: "10px 20px", width: "100%", boxSizing: "border-box" }}>
                    <input value={amount} onChange={(e) => setAmount(fmt(e.target.value))} placeholder="0" inputMode="numeric" style={{ flex: 1, background: "none", border: "none", color: discount ? "#f7768e" : "#7aa2f7", fontSize: 32, fontWeight: 900, textAlign: "right", outline: "none", padding: "16px 0", minWidth: 0 }} onKeyDown={(e) => e.key === "Enter" && submit()} />
                    <span style={{ fontSize: 22, color: "#8a94b5", fontWeight: 800, marginLeft: 10, flexShrink: 0 }}>원</span>
                  </div>
                  <QuickBtns val={amount} setVal={setAmount} />
                </div>
              
                <div style={{ display: "flex", gap: 12, marginBottom: 16, width: "100%", boxSizing: "border-box" }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", background: discount ? "rgba(247, 118, 142, 0.15)" : "rgba(255,255,255,0.05)", padding: "16px", borderRadius: 14, border: `1px solid ${discount ? "#f7768e" : "transparent"}`, transition: "0.2s", flexShrink: 0, whiteSpace: "nowrap" }}>
                    <input type="checkbox" checked={discount} onChange={(e) => setDiscount(e.target.checked)} style={{ accentColor: "#f7768e", width: 22, height: 22, margin: 0 }} />
                    <span style={{ fontSize: 16, color: discount ? "#f7768e" : "#a9b1d6", fontWeight: 800 }}>할인 적용</span>
                  </label>
                  {!discount && <input value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="작업 내용 (선택)" style={{ ...S.input, flex: 1, minWidth: 0 }} onKeyDown={(e) => e.key === "Enter" && submit()} />}
                </div>

                <div style={{ ...S.field, width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.02)", padding: "16px", borderRadius: 14 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                    <input type="checkbox" checked={useDeadline} onChange={(e) => setUseDeadline(e.target.checked)} style={{ accentColor: "#f7768e", width: 20, height: 20, margin: 0 }} />
                    <span style={{ fontSize: 15, color: useDeadline ? "#f7768e" : "#a9b1d6", fontWeight: 800 }}>마감일 알림 추가하기</span>
                  </label>
                  {useDeadline && (
                     <div className="animate-fade" style={{ marginTop: 12 }}>
                       <input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} style={{ ...S.input, width: "100%", boxSizing: "border-box", colorScheme: "dark", borderColor: "rgba(247, 118, 142, 0.4)" }} />
                     </div>
                  )}
                </div>
              
                <button onClick={submit} disabled={!client || !amount || isSubmitting} style={{ ...S.submitBtn, opacity: client && amount ? 1 : 0.3, background: discount ? "linear-gradient(135deg, #f7768e 0%, #ff9e64 100%)" : "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", width: "100%" }}>
                  {discount ? "할인 내역 저장" : "기록 저장하기"}
                </button>
              </div>
            </div>
          );
        }

        // ─── Main App ───
        function MainApp({ data, persist, user }) {
          const safeData = sanitizeData(data);
          const [pinState, setPinState] = useState(safeData.pin ? "verify" : "setup");
          const [vY, setVY] = useState(new Date().getFullYear());
          const [vM, setVM] = useState(new Date().getMonth());
          const [tab, setTab] = useState("summary");
          const [showAdd, setShowAdd] = useState(false);
          const [showSettings, setShowSettings] = useState(false);
          const [showClientManager, setShowClientManager] = useState(false);
          const [del, setDel] = useState(null);

          useEffect(() => {
            const lock = () => { if(safeData.pin) setPinState("verify"); };
            window.addEventListener("pagehide", lock);
            document.addEventListener("visibilitychange", () => { if(document.visibilityState === "hidden") lock(); });
            return () => { window.removeEventListener("pagehide", lock); };
          }, [safeData.pin]);

          if (pinState !== "unlocked") return <LockScreen mode={pinState} savedPin={safeData.pin} onSuccess={(p) => { if(pinState === "setup") persist({...safeData, pin: p}); setPinState("unlocked"); }} />;

          const curMk = mk(vY, vM);
          const monthEntries = safeData.entries.filter(e => { const d = new Date(e.date); return d.getFullYear() === vY && d.getMonth() === vM; });
          const unpaidMap = calcBalance(safeData.entries, safeData.payments, curMk);
          const endUnpaidMap = calcBalance(safeData.entries, safeData.payments, mk(vY, vM + 1));

          return (
            <div style={S.app}>
              <GlobalStyle />
              <Header year={vY} month={vM} onPrev={() => vM === 0 ? (setVY(vY-1), setVM(11)) : setVM(vM-1)} onNext={() => vM === 11 ? (setVY(vY+1), setVM(0)) : setVM(vM+1)} onToday={() => {setVY(new Date().getFullYear()); setVM(new Date().getMonth());}} onOpenSettings={() => setShowSettings(true)} />
              
              <div style={{ padding: "0 20px 140px", overflowY: "auto", height: "calc(100vh - 100px)" }}>
                {tab === "summary" ? (
                  <SummaryTab entries={monthEntries} unpaidMap={unpaidMap} year={vY} month={vM} onDelete={setDel} onEditEntry={(id, a, d) => persist({...safeData, entries: safeData.entries.map(e => e.id === id ? {...e, amount: a, desc: d} : e)})} />
                ) : (
                  <PaymentTab entries={monthEntries} unpaidMap={unpaidMap} endOfMonthUnpaidMap={endUnpaidMap} onFullCheck={(c, k, ch) => {
                    let ent = safeData.entries; let pay = {...safeData.payments};
                    if(ch) {
                      ent = ent.map(e => (e.client === c && mk(new Date(e.date).getFullYear(), new Date(e.date).getMonth()) === k) ? {...e, paid: true} : e);
                      const rem = calcBalance(ent, pay, mk(vY, vM+1))[c] || 0;
                      if(rem > 0) pay[`${k}::${c}`] = (pay[`${k}::${c}`] || 0) + rem;
                    } else {
                      ent = ent.map(e => (e.client === c && mk(new Date(e.date).getFullYear(), new Date(e.date).getMonth()) === k) ? {...e, paid: false} : e);
                      delete pay[`${k}::${c}`];
                    }
                    persist({...safeData, entries: ent, payments: pay});
                  }} onPartialPay={(c, k, a) => persist({...safeData, payments: {...safeData.payments, [`${k}::${c}`]: (safeData.payments[`${k}::${c}`]||0) + a}})} onResetPay={(c) => {const p = {...safeData.payments}; delete p[`${curMk}::${c}`]; persist({...safeData, payments: p});}} monthKey={curMk} payments={safeData.payments} />
                )}
              </div>

              <div style={S.navBar}>
                <button onClick={() => setTab("summary")} style={S.navItem}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={tab === "summary" ? "#7aa2f7" : "#565f89"} strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                  <span style={{ color: tab === "summary" ? "#7aa2f7" : "#565f89" }}>정산</span>
                </button>
                <button onClick={() => setShowAdd(true)} style={S.fab}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                <button onClick={() => setTab("payment")} style={S.navItem}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={tab === "payment" ? "#9ece6a" : "#565f89"} strokeWidth="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                  <span style={{ color: tab === "payment" ? "#9ece6a" : "#565f89" }}>입금</span>
                </button>
              </div>

              {showAdd && <BottomSheetForm clients={safeData.clients} onAdd={e => persist({...safeData, entries: [...safeData.entries, {...e, id: id(), paid: false}]})} onNewClient={n => persist({...safeData, clients: [...safeData.clients, n]})} onClose={() => setShowAdd(false)} />}
              {showSettings && <SettingsModal onChangePin={() => setPinState("change_old")} onManageClients={() => setShowClientManager(true)} onResetData={() => { persist({entries:[], clients:[], payments:{}, pin:null}); setPinState("setup"); }} onLogout={() => auth.signOut()} onClose={() => setShowSettings(false)} />}
              {showClientManager && <ClientManagerModal clients={safeData.clients} onUpdate={(o, n) => persist({...safeData, clients: safeData.clients.map(c => c === o ? n : c), entries: safeData.entries.map(e => e.client === o ? {...e, client: n} : e)})} onDelete={n => persist({...safeData, clients: safeData.clients.filter(c => c !== n)})} onClose={() => setShowClientManager(false)} />}
              <DeleteModal entry={del} onConfirm={() => { const ent = safeData.entries.filter(e => e.id !== del.id); persist({...safeData, entries: ent}); setDel(null); }} onCancel={() => setDel(null)} />
            </div>
          );
        }

        // ─── Payment Tab Components (미정산/선지급 깔끔 표기) ───
        function PaymentTab({ entries, unpaidMap, endOfMonthUnpaidMap, onFullCheck, onPartialPay, onResetPay, monthKey, payments }) {
          const byClient = {}; entries.forEach(e => { if(!byClient[e.client]) byClient[e.client] = []; byClient[e.client].push(e); });
          const allClients = [...new Set([...Object.keys(byClient), ...Object.keys(unpaidMap || {})])];
          
          const rows = allClients.map(c => {
            const items = byClient[c] || []; const thisTotal = items.reduce((s,e) => s+amt(e),0);
            const unpaid = unpaidMap[c] || 0; const endUnpaid = endOfMonthUnpaidMap[c] || 0;
            const total = thisTotal + unpaid; const paidAmt = payments[`${monthKey}::${c}`] || 0;
            const isFullyPaid = (items.length === 0 || items.every(e => e.paid)) && endUnpaid <= 0;
            if(items.length === 0 && unpaid === 0 && endUnpaid === 0) return null;
            return { c, items, total, unpaid, endUnpaid, paidAmt, isFullyPaid };
          }).filter(Boolean);

          const totalDue = rows.reduce((s, r) => s + r.total, 0);
          const totalPaid = rows.reduce((s, r) => s + r.paidAmt + (r.isFullyPaid && r.items.length > 0 ? r.total - r.paidAmt : 0), 0);

          if(rows.length === 0) return <div className="animate-fade" style={S.card}><div style={S.empty}>이번 달 기록이 없습니다.</div></div>;
          
          return (
            <div className="animate-fade">
              <div style={{ background: "rgba(36, 40, 59, 0.6)", borderRadius: 24, padding: "24px 20px", marginBottom: 24, border: "1px solid rgba(255,255,255,0.05)", display: "flex", justifyContent: "space-between" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>총 정산액</div>
                  <div style={{ fontSize: 20, fontWeight: 900, color: "#c0caf5" }}>{totalDue < 0 ? `-${won(Math.abs(totalDue))}` : won(totalDue)}원</div>
                </div>
                <div style={{ width: 1, background: "rgba(255,255,255,0.1)", margin: "0 16px" }} />
                <div style={{ flex: 1, textAlign: "right" }}>
                  <div style={{ fontSize: 13, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>완료된 입금</div>
                  <div style={{ fontSize: 20, fontWeight: 900, color: "#9ece6a" }}>{won(totalPaid)}원</div>
                </div>
              </div>
              
              {rows.map(r => (
                <div key={r.c} style={{ ...S.clientRow, opacity: r.isFullyPaid ? 0.5 : 1, padding: 20, marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <input type="checkbox" checked={r.isFullyPaid} onChange={() => onFullCheck(r.c, monthKey, !r.isFullyPaid)} style={{ width: 24, height: 24, accentColor: "#9ece6a" }} />
                      <div>
                         <span style={{ fontSize: 18, fontWeight: 800, textDecoration: r.isFullyPaid ? "line-through" : "none" }}>{r.c}</span>
                         {r.unpaid > 0 && <div style={{ fontSize: 11, color: "#e0af68", marginTop: 4, fontWeight: 700 }}>미정산 이월 포함됨</div>}
                         {r.unpaid < 0 && <div style={{ fontSize: 11, color: "#9ece6a", marginTop: 4, fontWeight: 700 }}>선지급 차감됨 (+{won(Math.abs(r.unpaid))})</div>}
                      </div>
                    </div>
                    <span style={{ fontSize: 20, fontWeight: 900, color: r.isFullyPaid ? "#565f89" : "#7aa2f7" }}>
                       {r.total < 0 ? `-${won(Math.abs(r.total))}` : won(r.total)}원
                    </span>
                  </div>
                  {!r.isFullyPaid && (
                    <div style={{ marginTop: 16 }}>
                      <div style={{ display: "flex", gap: 8 }}>
                        <input placeholder="분할 입금액" inputMode="numeric" style={S.partialInput} id={`input-${r.c}`} />
                        <button onClick={() => { const v = parseInt(document.getElementById(`input-${r.c}`).value.replace(/,/g,"")); if(v) onPartialPay(r.c, monthKey, v); document.getElementById(`input-${r.c}`).value=""; }} style={S.partialBtn}>입금</button>
                      </div>
                    </div>
                  )}
                  {r.paidAmt > 0 && (
                    <div style={{marginTop: 10, display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 10}}>
                      <div style={{fontSize: 13, color: "#9ece6a", fontWeight: 700}}>누적 입금: {won(r.paidAmt)}원</div>
                      <button onClick={() => onResetPay(r.c)} style={{ background: "rgba(231, 76, 60, 0.15)", border: "none", borderRadius: 8, color: "#e74c3c", fontSize: 12, fontWeight: 800, padding: "6px 10px" }}>취소</button>
                    </div>
                  )}
                  {r.isFullyPaid && r.endUnpaid < 0 && <div style={{marginTop: 10, fontSize: 13, color: "#9ece6a", fontWeight: 700, textAlign: "right"}}>선지급 잔액: +{won(Math.abs(r.endUnpaid))}원</div>}
                </div>
              ))}
            </div>
          );
        }

        function App() {
          const [user, setUser] = useState(null); const [data, setData] = useState(null); const [loading, setLoading] = useState(true);
          useEffect(() => auth.onAuthStateChanged(u => {
            if(u) { setUser(u); db.collection('users').doc(u.uid).get().then(doc => { setData(sanitizeData(doc.data() || {})); setLoading(false); }); }
            else { setUser(null); setData(null); setLoading(false); }
          }), []);
          const persist = useCallback((newData) => { setData(newData); if(user) db.collection('users').doc(user.uid).set(newData); }, [user]);
          if(loading) return <div style={S.overlay}><div style={{color:"#fff", fontWeight: 800}}>서버 연결 중...</div></div>;
          if(!user) return (
            <div style={{...S.overlay, flexDirection:"column", padding:30, textAlign:"center"}}>
              <div style={S.loginLogo}><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
              <h1 style={{fontSize: 26, fontWeight: 900}}>정산기 Pro 클라우드</h1>
              <p style={{color: "#8a94b5", marginBottom: 40}}>데이터를 클라우드에 안전하게 보관하세요.</p>
              <button onClick={() => auth.signInWithPopup(provider)} style={S.loginBtn}>구글 계정으로 시작하기</button>
            </div>
          );
          return <MainApp data={data} persist={persist} user={user} />;
        }

        // ─── Styles ───
        const S = {
          app: { background: "#0f111a", height: "100vh", color: "#e8e8ed", maxWidth: 480, margin: "0 auto", position: "relative" },
          header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "60px 20px 20px" },
          navBar: { position: "fixed", bottom: 24, left: 20, right: 20, height: 76, background: "rgba(26, 27, 38, 0.9)", backdropFilter: "blur(10px)", borderRadius: 38, display: "flex", alignItems: "center", padding: "0 10px", zIndex: 100 },
