            if (!raw) return { entries: [], clients: [], payments: {}, pin: null };

        const GlobalStyle = () => (
          <style>{`

        const calcBalance = (entries, payments, excludeMkStart) => {
          const bal = {};
          (entries || []).forEach(e => { const d = new Date(e.date); const eMk = mk(d.getFullYear(), d.getMonth()); if (excludeMkStart && eMk >= excludeMkStart) return; if (!e.paid) { bal[e.client] = (bal[e.client] || 0) + amt(e); } });
          Object.entries(payments || {}).forEach(([pk, val]) => { const parts = pk.split("::"); if(parts.length !== 2) return; const pMk = parts[0]; const client = parts[1]; if (excludeMkStart && pMk >= excludeMkStart) return; bal[client] = (bal[client] || 0) - val; });
          const out = {}; Object.entries(bal).forEach(([c, v]) => { if (v !== 0) out[c] = v; }); return out;
        };
        const cleanPay = (pay, clientsSet) => { const newPay = {}; Object.entries(pay || {}).forEach(([key, value]) => { const client = key.split("::")[1]; if (client && clientsSet.has(client)) newPay[key] = value; }); return newPay; };
          
        function LockScreen({ mode, savedPin, onSuccess, onCancel }) {
          const [pin, setPin] = useState(""); const [error, setError] = useState(false);

          const handlePress = (num) => { if (pin.length >= 4) return; const newPin = pin + num; setPin(newPin); setError(false); if (newPin.length === 4) { setTimeout(() => { if (mode === "setup" || mode === "change_new") { onSuccess(newPin); } else if (mode === "verify" || mode === "change_old") { if (newPin === savedPin) { onSuccess(newPin); } else { setError(true); setPin(""); } } }, 150); } };

                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", textAlign: "center", whiteSpace: "pre-wrap", lineHeight: 1.4, marginBottom: 40 }}>{getTitle()}</div>
                <div className={error ? "animate-shake" : ""} style={{ display: "flex", gap: 20 }}>{[0,1,2,3].map(i => <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: i < pin.length ? "#7aa2f7" : "rgba(255,255,255,0.1)", transition: "background 0.2s", boxShadow: i < pin.length ? "0 0 12px rgba(122, 162, 247, 0.6)" : "none" }} />)}</div>

              </div>
              <div style={{ padding: "0 24px 60px", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "16px 24px" }}>
                {[1,2,3,4,5,6,7,8,9].map(num => <button key={num} onClick={() => handlePress(num.toString())} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%" }}>{num}</button>)}
                <div />
                <button onClick={() => handlePress("0")} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%" }}>0</button>

        function QuickBtns({ val, setVal }) {

        function ClientManagerModal({ clients, onUpdate, onDelete, onClose }) {

              </div>)}

            </div>

        }

        function SettingsModal({ onChangePin, onManageClients, onResetData, onLogout, onClose }) {
          return (<div style={S.overlay} onClick={onClose}><div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 320, padding: 24, background: "#1a1b26"}}>
            <h3 style={{marginTop: 0, marginBottom: 20, fontSize: 20, fontWeight: 900, color: "#fff", textAlign: "center"}}>설정</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <button onClick={() => { onClose(); onChangePin(); }} style={S.settingMenuBtn}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 비밀번호 변경</button>

        }
          
        function Header({ year, month, onPrev, onNext, onToday, onOpenSettings }) {
          return (<div style={{ ...S.header, zIndex: 10 }}>
            <div style={{ width: 44 }} />
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <button onClick={onPrev} style={{...S.navBtn, border: "none", background: "none"}}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg></button>
              <div style={{...S.headerCenter, width: 90}} onClick={onToday}><span style={{ fontSize: 13, color: "#7a84a6", fontWeight: 700, letterSpacing: 1, marginBottom: 2 }}>{year}년</span><span style={{ fontSize: 24, fontWeight: 800, color: "#e0e2eb", letterSpacing: 1 }}>{MONTHS[month]}</span></div>

            </div>
            <button onClick={onOpenSettings} style={{...S.navBtn, width: 44, height: 44, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "#a9b1d6"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          </div>);
        }
          
        function TotalDashboard({ current, unpaidMap }) {
          let sumUnpaid = 0; let sumPrepaid = 0;
          Object.values(unpaidMap || {}).forEach(v => { if (v > 0) sumUnpaid += v; else if (v < 0) sumPrepaid += Math.abs(v); });
          const finalTotal = (current || 0) + sumUnpaid - sumPrepaid;
          return (<div style={{ ...S.card, padding: "26px 20px", marginBottom: 24, background: "linear-gradient(145deg, #1f2233 0%, #161824 100%)", border: "1px solid rgba(255,255,255,0.05)", textAlign: "center", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
            <span style={{ fontSize: 14, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>이번 달 최종 정산액</span>
            <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}><span style={{ fontSize: 34, fontWeight: 900, color: finalTotal < 0 ? "#f7768e" : "#fff", letterSpacing: "-1px" }}>{finalTotal < 0 ? "-" : ""}{Math.abs(finalTotal).toLocaleString("ko-KR")}</span><span style={{ fontSize: 18, fontWeight: 700, color: finalTotal < 0 ? "#f7768e" : "#7aa2f7" }}>원</span></div>
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              {sumUnpaid > 0 && <div style={{ padding: "6px 12px", background: "rgba(224, 175, 104, 0.15)", borderRadius: 10, display: "flex", gap: 6, alignItems: "center" }}><span style={{ fontSize: 12, color: "#e0af68", fontWeight: 700 }}>미정산 이월</span><span style={{ fontSize: 13, color: "#e0af68", fontWeight: 900 }}>+{sumUnpaid.toLocaleString("ko-KR")}원</span></div>}
              {sumPrepaid > 0 && <div style={{ padding: "6px 12px", background: "rgba(158, 206, 106, 0.15)", borderRadius: 10, display: "flex", gap: 6, alignItems: "center" }}><span style={{ fontSize: 12, color: "#9ece6a", fontWeight: 700 }}>선지급 차감됨</span><span style={{ fontSize: 13, color: "#9ece6a", fontWeight: 900 }}>-{sumPrepaid.toLocaleString("ko-KR")}원</span></div>}
            </div>
          </div>);
        }
          
        function Calendar({ year, month, entries, selectedDay, onSelect }) {
          const firstDay = new Date(year, month, 1).getDay(); const totalDays = new Date(year, month+1, 0).getDate();
          const now = new Date(); const isNow = now.getFullYear()===year&&now.getMonth()===month; const todayDate = now.getDate();
          const totals = (entries||[]).reduce((acc, e) => { const d = new Date(e.date).getDate(); if(!isNaN(d)) acc[d] = (acc[d]||0)+amt(e); return acc; }, {});
          const maxAmt = Math.max(0, ...Object.values(totals).map(Math.abs));
          const cells = [];
          DAYS.forEach((d, i) => { cells.push(<div key={`h${i}`} style={{...S.calHead, color: i===0?"#f7768e":i===6?"#7aa2f7":"#565f89"}}>{d}</div>); });
          for (let i = 0; i < firstDay; i++) cells.push(<div key={`e${i}`} style={S.calCell} />);
          for (let d = 1; d <= totalDays; d++) {
            const hasData = totals[d]!==undefined; const isSelected = selectedDay===d; const isToday = isNow&&todayDate===d; const dow = (firstDay+d-1)%7;
            let bgOpacity = 0; if (hasData && maxAmt > 0) bgOpacity = Math.min(1, Math.abs(totals[d])/maxAmt)*0.35;

          useEffect(() => { const lockApp = () => { if (safeData.pin) setPinState("verify"); }; const hvc = () => { if (document.visibilityState==="hidden") lockApp(); }; document.addEventListener("visibilitychange", hvc); window.addEventListener("pagehide", lockApp); return () => { document.removeEventListener("visibilitychange", hvc); window.removeEventListener("pagehide", lockApp); }; }, [safeData.pin]);

          const handlePinSuccess = (p) => { if (pinState==="setup"||pinState==="change_new") { persist({...safeData, pin: p}); setPinState("unlocked"); } else if (pinState==="verify") { setPinState("unlocked"); } else if (pinState==="change_old") { setPinState("change_new"); } };
          const onUpdateClient = (oldN, newN) => { if (oldN===newN||!newN.trim()||safeData.clients.includes(newN)) return; const nc = safeData.clients.map(c => c===oldN?newN:c); const ne = safeData.entries.map(e => e.client===oldN?{...e, client: newN}:e); const np = {}; Object.entries(safeData.payments).forEach(([k,v]) => { if (k.endsWith(`::${oldN}`)) np[k.replace(`::${oldN}`, `::${newN}`)]=v; else np[k]=v; }); persist({...safeData, clients: nc, entries: ne, payments: np}); };
          const onDeleteClient = (name) => { if (!confirm(`'${name}' 업체를 목록에서 삭제할까요?`)) return; persist({...safeData, clients: safeData.clients.filter(c => c!==name)}); };

          if (pinState !== "unlocked") return <LockScreen mode={pinState} savedPin={safeData.pin} onSuccess={handlePinSuccess} onCancel={pinState.startsWith("change_")?() => setPinState("unlocked"):null} />;

          const curMk = mk(vY, vM); const nextMonthMk = vM===11?mk(vY+1,0):mk(vY,vM+1);
          const monthEntries = safeData.entries.filter(e => { const d = new Date(e.date); return d.getFullYear()===vY&&d.getMonth()===vM; });
          const initialUnpaidMap = calcBalance(safeData.entries, safeData.payments, curMk);
          const endOfMonthUnpaidMap = calcBalance(safeData.entries, safeData.payments, nextMonthMk);

          const onAdd = entry => persist({...safeData, entries: [...safeData.entries, {...entry, id: id(), paid: false}]});
          const onNewClient = name => { if (!safeData.clients.includes(name)) persist({...safeData, clients: [...safeData.clients, name]}); };
          const onPartialPay = (client, key, amount) => { const pk = `${key}::${client}`; persist({...safeData, payments: {...safeData.payments, [pk]: (safeData.payments[pk]||0)+amount}}); };
          const onResetPay = client => { const np = {...safeData.payments}; delete np[`${curMk}::${client}`]; persist({...safeData, payments: np}); };
          const onFullCheck = (client, key, check) => { let ent = safeData.entries; let pay = {...safeData.payments}; const pk = `${key}::${client}`; if (check) { ent = ent.map(e => { const d = new Date(e.date); return e.client===client&&mk(d.getFullYear(),d.getMonth())===key?{...e, paid: true}:e; }); const tempBal = calcBalance(ent, pay, nextMonthMk); const remaining = tempBal[client]||0; if (remaining>0) pay[pk] = (pay[pk]||0)+remaining; } else { ent = ent.map(e => { const d = new Date(e.date); return e.client===client&&mk(d.getFullYear(),d.getMonth())===key?{...e, paid: false}:e; }); delete pay[pk]; } persist({...safeData, entries: ent, payments: pay}); };
          const onDelete = entry => { const ent = safeData.entries.filter(e => e.id!==entry.id); persist({...safeData, entries: ent, payments: cleanPay(safeData.payments, new Set(ent.map(e => e.client)))}); setDel(null); };
          const onEditEntry = (id, a, desc) => persist({...safeData, entries: safeData.entries.map(e => e.id===id?{...e, amount: a, desc}:e)});
          const onResetData = () => { persist({ entries: [], clients: [], payments: {}, pin: null }); setPinState("setup"); alert("모든 데이터가 초기화되었습니다."); };

          const prev = () => { if (vM===0) { setVY(vY-1); setVM(11); } else setVM(vM-1); };
          const next = () => { if (vM===11) { setVY(vY+1); setVM(0); } else setVM(vM+1); };
          const goToday = () => { const n = new Date(); setVY(n.getFullYear()); setVM(n.getMonth()); };

          return (<div style={S.app}><GlobalStyle />
            <Header year={vY} month={vM} onPrev={prev} onNext={next} onToday={goToday} onOpenSettings={() => setShowSettings(true)} />
            <div style={{ padding: "0 20px 140px", overflowY: "auto", height: "calc(100vh - 100px)", WebkitOverflowScrolling: "touch" }}>
              {/* ─── [수정4] SummaryTab에 allEntries 전달 ─── */}
              {tab==="summary" && <SummaryTab entries={monthEntries} unpaidMap={initialUnpaidMap} year={vY} month={vM} onDelete={setDel} onEditEntry={onEditEntry} allEntries={safeData.entries} />}
              {tab==="payment" && <PaymentTab entries={monthEntries} unpaidMap={initialUnpaidMap} endOfMonthUnpaidMap={endOfMonthUnpaidMap} onFullCheck={onFullCheck} onPartialPay={onPartialPay} onResetPay={onResetPay} monthKey={curMk} payments={safeData.payments} />}
            </div>
            <div style={{ position: "fixed", bottom: "max(24px, env(safe-area-inset-bottom))", left: 20, right: 20, maxWidth: 440, margin: "0 auto", height: 76, background: "rgba(26,27,38,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderRadius: 38, border: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 10px", zIndex: 30, boxShadow: "0 24px 48px rgba(0,0,0,0.5)" }}>
              <button onClick={() => setTab("summary")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>{tab==="summary" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab==="summary"?"#7aa2f7":"#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg><span style={{ fontSize: 13, fontWeight: tab==="summary"?900:700, color: tab==="summary"?"#7aa2f7":"#565f89" }}>정산</span></button>
              <button onClick={() => setShowAdd(true)} style={{ width: 62, height: 62, borderRadius: "50%", background: "linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", color: "#0f111a", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transform: "translateY(-16px)", boxShadow: "0 12px 28px rgba(122,162,247,0.4)" }} onPointerDown={e => e.currentTarget.style.transform="translateY(-14px) scale(0.95)"} onPointerUp={e => e.currentTarget.style.transform="translateY(-16px) scale(1)"}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
              <button onClick={() => setTab("payment")} style={{ flex: 1, height: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, position: "relative" }}>{tab==="payment" && <div style={{ position: "absolute", inset: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 24, zIndex: -1 }} className="animate-fade" />}<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={tab==="payment"?"#9ece6a":"#565f89"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span style={{ fontSize: 13, fontWeight: tab==="payment"?900:700, color: tab==="payment"?"#9ece6a":"#565f89" }}>입금</span></button>
            </div>
            {showSettings && <SettingsModal onChangePin={() => setPinState("change_old")} onManageClients={() => setShowClientManager(true)} onResetData={onResetData} onLogout={() => auth.signOut()} onClose={() => setShowSettings(false)} />}
            {showClientManager && <ClientManagerModal clients={safeData.clients} onUpdate={onUpdateClient} onDelete={onDeleteClient} onClose={() => setShowClientManager(false)} />}
            {showAdd && <BottomSheetForm clients={safeData.clients} onAdd={onAdd} onNewClient={onNewClient} onClose={() => setShowAdd(false)} />}
            <DeleteModal entry={del} onConfirm={() => onDelete(del)} onCancel={() => setDel(null)} />
          </div>);
        }

        function App() {
          const [user, setUser] = useState(null); const [data, setData] = useState(null); const [loading, setLoading] = useState(true);
          useEffect(() => { const unsub = auth.onAuthStateChanged(u => { if (u) { setUser(u); db.collection('users').doc(u.uid).get().then(doc => { if (doc.exists) { setData(sanitizeData(doc.data())); } else { const lr = localStorage.getItem(KEY); let dd = { entries: [], clients: [], payments: {}, pin: null }; if (lr) { try { const p = JSON.parse(lr); if (p) dd = sanitizeData(p); } catch(e) {} } setData(dd); db.collection('users').doc(u.uid).set(dd); } setLoading(false); }).catch(() => { alert("데이터베이스 연결 실패!"); auth.signOut(); setLoading(false); }); } else { setUser(null); setData(null); setLoading(false); } }); return unsub; }, []);
          const persist = useCallback(nd => { setData(nd); if (user) db.collection('users').doc(user.uid).set(nd).catch(console.error); }, [user]);
          if (loading) return <div style={S.overlay}><div style={{color:"#fff", fontSize: 18, fontWeight: 800}}>서버 연결 중...</div></div>;
          if (!user) return (<div style={{...S.overlay, background: "#0f111a", flexDirection: "column", padding: 30, textAlign: "center"}}>
            <div style={{width: 80, height: 80, borderRadius: 24, background: "linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 30, boxShadow: "0 15px 35px rgba(122,162,247,0.3)"}}><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
            <h1 style={{fontSize: 26, fontWeight: 900, color: "#fff", marginBottom: 10}}>정산기 Pro 클라우드</h1>
            <p style={{fontSize: 15, color: "#8a94b5", lineHeight: 1.5, marginBottom: 40, wordBreak: "keep-all"}}>데이터가 서버에 안전하게 자동 저장됩니다.<br/>폰을 바꾸거나 방문 기록을 지워도 안심하세요!</p>
            <button onClick={() => auth.signInWithPopup(provider)} style={{...S.submitBtn, display: "flex", alignItems: "center", justifyContent: "center", gap: 12, background: "#fff", color: "#111", padding: "16px 0", borderRadius: 16}}><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>구글 계정으로 시작하기</button>
          </div>);
          return <MainApp data={data} persist={persist} user={user} />;
        }

        const S = {
          app: { background: "#0f111a", minHeight: "100vh", color: "#e8e8ed", maxWidth: 480, margin: "0 auto", position: "relative" },
          header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "calc(env(safe-area-inset-top) + 20px) 20px 24px", background: "transparent" },
          navBtn: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 14, color: "#8a94b5", width: 48, height: 48, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 },
          headerCenter: { display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer" },
          card: { background: "rgba(36,40,59,0.4)", borderRadius: 24, border: "1px solid rgba(255,255,255,0.03)" },
          calGrid: { display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 },
          calHead: { textAlign: "center", fontSize: 13, fontWeight: 800, padding: "8px 0", color: "#565f89" },
          calCell: { display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 2px", minHeight: 60 },
          empty: { textAlign: "center", color: "#565f89", padding: "80px 0", fontSize: 16, fontWeight: 700 },
          field: { marginBottom: 24 },
          row: { display: "flex", gap: 12 },
          select: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none", appearance: "none" },
          plusBtn: { width: 54, height: 54, borderRadius: 14, fontSize: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: "none", fontWeight: 300 },
          confirmBtn: { padding: "0 20px", background: "#7aa2f7", border: "none", borderRadius: 14, color: "#0f111a", fontSize: 16, fontWeight: 900, cursor: "pointer" },
          input: { flex: 1, padding: "16px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, outline: "none" },
          submitBtn: { width: "100%", padding: "20px 0", border: "none", borderRadius: 18, color: "#0f111a", fontSize: 18, fontWeight: 900, cursor: "pointer", marginTop: 10, boxShadow: "0 10px 24px rgba(0,0,0,0.2)" },
          partialBtn: { background: "rgba(255,255,255,0.03)", border: "2px dashed rgba(255,255,255,0.15)", borderRadius: 14, color: "#a9b1d6", fontSize: 15, fontWeight: 700, padding: "14px", cursor: "pointer", width: "100%", textAlign: "center" },
          partialInput: { flex: 1, padding: "14px 16px", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#fff", fontSize: 17, fontWeight: 800, textAlign: "right", outline: "none" },
          delBtn: { width: 36, height: 36, background: "rgba(231,76,60,0.1)", border: "none", borderRadius: 10, color: "#e74c3c", fontSize: 15, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" },
          editBtn: { padding: "8px 14px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 10, color: "#a9b1d6", fontSize: 14, fontWeight: 800, cursor: "pointer" },
          overlay: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 },
          settingMenuBtn: { display: "flex", alignItems: "center", gap: 12, padding: "16px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 14, color: "#e0e2eb", fontSize: 16, fontWeight: 700, cursor: "pointer", textAlign: "left", width: "100%" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
