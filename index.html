<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>프리랜서 정산기 Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin: 0; background: #0f111a;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
     
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCYjTb8SN-Vq7GoF2LPem_4VRQ8fPb8oFw",
            authDomain: "pp-backup-c0ad2.firebaseapp.com",
            projectId: "pp-backup-c0ad2",
            storageBucket: "pp-backup-c0ad2.firebasestorage.app",
            messagingSenderId: "356643544206",
            appId: "1:356643544206:web:15a5ef0bbd346415d07ddf",
            measurementId: "G-2RJY1LV1MX"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
        const DAYS = ["일","월","화","수","목","금","토"];
        const KEY = "freelance-tracker-v27";
        const COLORS = ["#7aa2f7","#bb9af7","#9ece6a","#e0af68","#f7768e","#7dcfff","#ff9e64","#73daca"];
          
        // 유틸리티 함수
        const id = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const mk = (y, m) => `${y}-${String(m + 1).padStart(2, "0")}`;
        const won = (n) => (n === 0 ? "0원" : Math.abs(n).toLocaleString("ko-KR") + "원");
        const amt = (e) => (e.discount ? -e.amount : e.amount);
        const tag = (e) => (e.discount ? "할인" : e.desc || "작업");
        const fmt = (v) => { const n = String(v).replace(/[^0-9]/g, ""); return n ? parseInt(n, 10).toLocaleString("ko-KR") : ""; };
        const today = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
        const getDDay = (deadline) => { 
            if (!deadline) return null; 
            const target = new Date(deadline).setHours(0,0,0,0); 
            const now = new Date().setHours(0,0,0,0); 
            return Math.floor((target - now) / (1000*60*60*24)); 
        };

        const sanitizeData = (raw) => {
            if (!raw) return { entries: [], clients: [], payments: {}, pin: null };
            const validEntries = Array.isArray(raw.entries) ? raw.entries.filter(e => e && e.client && e.date) : [];
            const uniqueEntries = Array.from(new Map(validEntries.map(e => [e.id, e])).values());
            return { entries: uniqueEntries, clients: Array.isArray(raw.clients) ? raw.clients : [], payments: raw.payments || {}, pin: raw.pin || null };
        };
          
        // 글로벌 CSS 스타일
        const GlobalStyle = () => (
            <style>{`
                @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes popIn { 0% { transform: scale(0.95) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
                @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
                .animate-slide { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                .animate-fade { animation: fadeIn 0.25s ease forwards; }
                .animate-pop { animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                .animate-shake { animation: shake 0.4s ease-in-out; }
                * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
                body { margin: 0; background: #0f111a; overscroll-behavior-y: none; color: #fff; }
                ::-webkit-scrollbar { display: none; }
                input, select, button { outline: none; font-family: inherit; }
            `}</style>
        );
          
        // 데이터 정산 로직
        const calcBalance = (entries, payments, excludeMkStart) => {
            const bal = {};
            (entries || []).forEach(e => { 
                const d = new Date(e.date); 
                const eMk = mk(d.getFullYear(), d.getMonth()); 
                if (excludeMkStart && eMk >= excludeMkStart) return; 
                if (!e.paid) bal[e.client] = (bal[e.client] || 0) + amt(e); 
            });
            Object.entries(payments || {}).forEach(([pk, val]) => { 
                const parts = pk.split("::"); 
                if(parts.length !== 2) return; 
                const pMk = parts[0]; 
                const client = parts[1]; 
                if (excludeMkStart && pMk >= excludeMkStart) return; 
                bal[client] = (bal[client] || 0) - val; 
            });
            const out = {}; 
            Object.entries(bal).forEach(([c, v]) => { if (v !== 0) out[c] = v; }); 
            return out;
        };

        const cleanPay = (pay, clientsSet) => { 
            const newPay = {}; 
            Object.entries(pay || {}).forEach(([key, value]) => { 
                const client = key.split("::")[1]; 
                if (client && clientsSet.has(client)) newPay[key] = value; 
            }); 
            return newPay; 
        };
          
        // ─── 잠금 화면 ───
        function LockScreen({ mode, savedPin, onSuccess, onCancel }) {
            const [pin, setPin] = useState(""); 
            const [error, setError] = useState(false);

            useEffect(() => { setPin(""); setError(false); }, [mode]);

            const getTitle = () => { 
                if (mode === "setup") return "환영합니다!\n사용할 비밀번호를 설정해주세요"; 
                if (mode === "verify") return "비밀번호를 입력해주세요"; 
                if (mode === "change_old") return "기존 비밀번호를 입력해주세요"; 
                if (mode === "change_new") return "새로운 비밀번호를 입력해주세요"; 
            };

            const handlePress = (num) => { 
                if (pin.length >= 4) return; 
                const newPin = pin + num; 
                setPin(newPin); 
                setError(false); 
                if (newPin.length === 4) { 
                    setTimeout(() => { 
                        if (mode === "setup" || mode === "change_new") { onSuccess(newPin); } 
                        else if (mode === "verify" || mode === "change_old") { 
                            if (newPin === savedPin) onSuccess(newPin); 
                            else { setError(true); setPin(""); } 
                        } 
                    }, 150); 
                } 
            };
            const handleDelete = () => setPin(pin.slice(0, -1));

            return (
                <div style={{ position: "fixed", inset: 0, background: "#0f111a", display: "flex", flexDirection: "column", zIndex: 9999 }} className="animate-fade">
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        {onCancel && <button onClick={onCancel} style={{ position: "absolute", top: "calc(env(safe-area-inset-top) + 24px)", right: 24, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.15)", color: "#a9b1d6", padding: "8px 16px", borderRadius: 12, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>취소</button>}
                        <div style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24, boxShadow: "0 10px 30px rgba(122, 162, 247, 0.3)" }}>
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", textAlign: "center", whiteSpace: "pre-wrap", lineHeight: 1.4, marginBottom: 40 }}>{getTitle()}</div>
                        <div className={error ? "animate-shake" : ""} style={{ display: "flex", gap: 20 }}>
                            {[0,1,2,3].map(i => <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: i < pin.length ? "#7aa2f7" : "rgba(255,255,255,0.1)", transition: "background 0.2s", boxShadow: i < pin.length ? "0 0 12px rgba(122, 162, 247, 0.6)" : "none" }} />)}
                        </div>
                        <div style={{ height: 20, marginTop: 16 }}>{error && <span style={{ color: "#f7768e", fontSize: 14, fontWeight: 600 }}>비밀번호가 일치하지 않습니다.</span>}</div>
                    </div>
                    <div style={{ padding: "0 24px 60px", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "16px 24px" }}>
                        {[1,2,3,4,5,6,7,8,9].map(num => <button key={num} onClick={() => handlePress(num.toString())} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%" }}>{num}</button>)}
                        <div />
                        <button onClick={() => handlePress("0")} style={{ height: 72, background: "none", border: "none", color: "#fff", fontSize: 32, fontWeight: 600, cursor: "pointer", borderRadius: "50%" }}>0</button>
                        <button onClick={handleDelete} style={{ height: 72, background: "none", border: "none", color: "#8a94b5", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "50%" }}>
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                        </button>
                    </div>
                </div>
            );
        }
          
        function QuickBtns({ val, setVal }) {
            return (
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                    {[10,5,1].map(n => (
                        <button key={n} onClick={() => { const c = parseInt((val||"0").replace(/,/g,""),10)||0; setVal((c+n*10000).toLocaleString("ko-KR")); }} style={{ flex: 1, padding: "12px 0", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, color: "#7aa2f7", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                            +{n}만
                        </button>
                    ))}
                </div>
            );
        }

        // ─── 업체 목록 관리 ───
        function ClientManagerModal({ clients, onUpdate, onDelete, onClose }) {
            const [editName, setEditName] = useState(null); 
            const [newVal, setNewVal] = useState("");

            return (
                <div style={S.overlay} onClick={onClose}>
                    <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 360, background: "#1a1b26", padding: 24}}>
                        <h3 style={{marginTop:0, marginBottom: 20, fontSize: 20, fontWeight: 900}}>업체 목록 관리</h3>
                        <div style={{maxHeight: "50vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, paddingRight: 5}}>
                            {(clients||[]).map(c => (
                                <div key={c} style={{display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.05)", padding: "12px 16px", borderRadius: 14}}>
                                    {editName === c ? (
                                        <div style={{display: "flex", gap: 8, width: "100%", alignItems: "center"}}>
                                            <input autoFocus value={newVal} onChange={e => setNewVal(e.target.value)} onKeyDown={e => e.key==="Enter"&&(onUpdate(c, newVal), setEditName(null))} style={{...S.input, padding: "8px 12px", margin: 0, flex: 1, fontSize: 15, minWidth: 0}} />
                                            <button onClick={() => { onUpdate(c, newVal); setEditName(null); }} style={{...S.confirmBtn, padding: "8px 14px", borderRadius: 10, flexShrink: 0, fontSize: 14, height: "100%"}}>확인</button>
                                        </div>
                                    ) : (
                                        <>
                                            <span style={{fontSize: 16, fontWeight: 800}}>{c}</span>
                                            <div style={{display: "flex", gap: 8}}>
                                                <button onClick={() => { setEditName(c); setNewVal(c); }} style={{...S.editBtn, padding: "6px 12px", borderRadius: 8}}>수정</button>
                                                <button onClick={() => onDelete(c)} style={{...S.delBtn, width: 32, height: 32, borderRadius: 8}}>✕</button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            ))}
                            {clients.length === 0 && <div style={{textAlign: "center", color: "#8a94b5", padding: "30px 0", fontSize: 15}}>등록된 업체가 없습니다.</div>}
                        </div>
                        <button onClick={onClose} style={{...S.submitBtn, marginTop: 24, background: "rgba(255,255,255,0.1)", color: "#fff", padding: "16px 0", borderRadius: 14}}>닫기</button>
                    </div>
                </div>
            );
        }

        // ─── 설정 화면 ───
        function SettingsModal({ onChangePin, onManageClients, onResetData, onLogout, onClose }) {
            return (
                <div style={S.overlay} onClick={onClose}>
                    <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 320, padding: 24, background: "#1a1b26"}}>
                        <h3 style={{marginTop: 0, marginBottom: 20, fontSize: 20, fontWeight: 900, color: "#fff", textAlign: "center"}}>설정</h3>
                        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                            <button onClick={() => { onClose(); onChangePin(); }} style={S.settingMenuBtn}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 비밀번호 변경
                            </button>
                            <button onClick={() => { onClose(); onManageClients(); }} style={S.settingMenuBtn}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e0af68" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/></svg> 업체 목록 관리
                            </button>
                            <div style={{ height: 1, background: "rgba(255,255,255,0.05)", margin: "8px 0" }} />
                            <button onClick={() => { if(window.confirm("⚠️ 경고: 정말 모든 데이터를 초기화하시겠습니까?\n이 작업은 절대 복구할 수 없습니다!")) { if(window.confirm("마지막 확인입니다. 정말 전부 지울까요?")) { onClose(); onResetData(); } } }} style={{...S.settingMenuBtn, color: "#e74c3c", background: "rgba(231, 76, 60, 0.1)"}}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> 데이터 전체 초기화
                            </button>
                            <button onClick={() => { onClose(); onLogout(); }} style={{...S.settingMenuBtn, color: "#a9b1d6"}}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 로그아웃
                            </button>
                        </div>
                        <button onClick={onClose} style={{...S.submitBtn, marginTop: 24, background: "rgba(255,255,255,0.05)", color: "#a9b1d6", padding: "14px 0", borderRadius: 14}}>닫기</button>
                    </div>
                </div>
            );
        }
          
        // ─── 상단 헤더 ───
        function Header({ year, month, onPrev, onNext, onToday, onOpenSettings }) {
            return (
                <div style={{ ...S.header, zIndex: 10 }}>
                    <div style={{ width: 44 }} />
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                        <button onClick={onPrev} style={{...S.navBtn, border: "none", background: "none"}}>
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
                        </button>
                        <div style={{...S.headerCenter, width: 90}} onClick={onToday}>
                            <span style={{ fontSize: 13, color: "#7a84a6", fontWeight: 700, letterSpacing: 1, marginBottom: 2 }}>{year}년</span>
                            <span style={{ fontSize: 24, fontWeight: 800, color: "#e0e2eb", letterSpacing: 1 }}>{MONTHS[month]}</span>
                        </div>
                        <button onClick={onNext} style={{...S.navBtn, border: "none", background: "none"}}>
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>
                        </button>
                    </div>
                    <button onClick={onOpenSettings} style={{...S.navBtn, width: 44, height: 44, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "#a9b1d6"}}>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                </div>
            );
        }
          
        function TotalDashboard({ current, unpaidMap }) {
            let sumUnpaid = 0; let sumPrepaid = 0;
            Object.values(unpaidMap || {}).forEach(v => { 
                if (v > 0) sumUnpaid += v; 
                else if (v < 0) sumPrepaid += Math.abs(v); 
            });
            const finalTotal = (current || 0) + sumUnpaid - sumPrepaid;

            return (
                <div style={{ ...S.card, padding: "26px 20px", marginBottom: 24, background: "linear-gradient(145deg, #1f2233 0%, #161824 100%)", border: "1px solid rgba(255,255,255,0.05)", textAlign: "center", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
                    <span style={{ fontSize: 14, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>이번 달 최종 정산액</span>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                        <span style={{ fontSize: 34, fontWeight: 900, color: finalTotal < 0 ? "#f7768e" : "#fff", letterSpacing: "-1px" }}>
                            {finalTotal < 0 ? "-" : ""}{Math.abs(finalTotal).toLocaleString("ko-KR")}
                        </span>
                        <span style={{ fontSize: 18, fontWeight: 700, color: finalTotal < 0 ? "#f7768e" : "#7aa2f7" }}>원</span>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                        {sumUnpaid > 0 && <div style={{ padding: "6px 12px", background: "rgba(224, 175, 104, 0.15)", borderRadius: 10, display: "flex", gap: 6, alignItems: "center" }}><span style={{ fontSize: 12, color: "#e0af68", fontWeight: 700 }}>미정산 이월</span><span style={{ fontSize: 13, color: "#e0af68", fontWeight: 900 }}>+{sumUnpaid.toLocaleString("ko-KR")}원</span></div>}
                        {sumPrepaid > 0 && <div style={{ padding: "6px 12px", background: "rgba(158, 206, 106, 0.15)", borderRadius: 10, display: "flex", gap: 6, alignItems: "center" }}><span style={{ fontSize: 12, color: "#9ece6a", fontWeight: 700 }}>선지급 차감됨</span><span style={{ fontSize: 13, color: "#9ece6a", fontWeight: 900 }}>-{sumPrepaid.toLocaleString("ko-KR")}원</span></div>}
                    </div>
                </div>
            );
        }
          
        // ─── 달력 ───
        function Calendar({ year, month, entries, selectedDay, onSelect }) {
            const firstDay = new Date(year, month, 1).getDay(); 
            const totalDays = new Date(year, month+1, 0).getDate();
            const now = new Date(); 
            const isNow = now.getFullYear()===year&&now.getMonth()===month; 
            const todayDate = now.getDate();
            const totals = (entries||[]).reduce((acc, e) => { 
                const d = new Date(e.date).getDate(); 
                if(!isNaN(d)) acc[d] = (acc[d]||0)+amt(e); 
                return acc; 
            }, {});
            const maxAmt = Math.max(0, ...Object.values(totals).map(Math.abs));
            
            const cells = [];
            DAYS.forEach((d, i) => { cells.push(<div key={`h${i}`} style={{...S.calHead, color: i===0?"#f7768e":i===6?"#7aa2f7":"#565f89"}}>{d}</div>); });
            for (let i = 0; i < firstDay; i++) cells.push(<div key={`e${i}`} style={S.calCell} />);
            for (let d = 1; d <= totalDays; d++) {
                const hasData = totals[d]!==undefined; 
                const isSelected = selectedDay===d; 
                const isToday = isNow&&todayDate===d; 
                const dow = (firstDay+d-1)%7;
                
                let bgOpacity = 0; 
                if (hasData && maxAmt > 0) bgOpacity = Math.min(1, Math.abs(totals[d])/maxAmt)*0.35;
                
                cells.push(
                    <div key={d} onClick={() => hasData && onSelect(isSelected?null:d)} style={{...S.calCell, border: isSelected?"1px solid rgba(122,162,247,0.5)":"1px solid transparent", background: hasData?`rgba(${totals[d]<0?"247,118,142":"122,162,247"}, ${bgOpacity})`:"transparent", cursor: hasData?"pointer":"default", borderRadius: 14, transition: "all 0.3s"}}>
                        <span style={{fontSize: 14, fontWeight: isToday?800:700, color: isToday?"#0f111a":dow===0?"#f7768e":dow===6?"#7aa2f7":"#a9b1d6", background: isToday?"#7aa2f7":"none", borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center"}}>{d}</span>
                        {hasData && <span style={{fontSize: 9.5, fontWeight: 800, marginTop: 4, color: totals[d]<0?"#f7768e":"#c0caf5", letterSpacing: "-0.5px"}}>{totals[d]<0?"-":"+"}{Math.abs(totals[d]).toLocaleString("ko-KR")}</span>}
                    </div>
                );
            }
            return <div style={{...S.card, padding: "20px 12px", marginBottom: 24}}><div style={S.calGrid}>{cells}</div></div>;
        }

        // ─── ✨ 프리미엄 Invoice 정산서 ✨ ───
        function ReceiptModal({ client, month, year, items, unpaid, unpaidItems, onClose }) {
            const [isProcessing, setIsProcessing] = useState(false);
            const currentTotal = items.reduce((s, e) => s + amt(e), 0);
            const finalTotal = currentTotal + unpaid;
            const d = new Date();
            const todayStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;

            // 금액 길이에 따른 다이나믹 폰트
            const finalTotalStr = finalTotal < 0 ? "0" : Math.abs(finalTotal).toLocaleString("ko-KR");
            const dueFontSize = finalTotalStr.length > 11 ? 20 : finalTotalStr.length > 8 ? 24 : 30;
            const totalFontSize = finalTotalStr.length > 11 ? 16 : finalTotalStr.length > 8 ? 18 : 22;

            const sortedUnpaidItems = [...(unpaidItems || [])].sort((a, b) => new Date(a.date) - new Date(b.date));

            const copyText = async () => {
                const lines = [`[${year}년 ${month+1}월] ${client}`, "", ...items.map(e => `- ${tag(e)} : ${e.discount?"-":""}${won(e.amount)}`)];
                if (unpaid > 0) { 
                    lines.push("", "미정산 이월: "+won(unpaid)); 
                    sortedUnpaidItems.forEach(e => {
                        const itemMonth = new Date(e.date).getMonth() + 1;
                        lines.push(`  - ${tag(e)} (${itemMonth}월) : ${e.discount?"-":""}${won(e.amount)}`);
                    }); 
                }
                if (unpaid < 0) lines.push("", "선지급 차감: -"+won(Math.abs(unpaid)));
                lines.push("", "총 청구액: "+(finalTotal<0?"0원 (선지급 잔액 +"+won(Math.abs(finalTotal))+")":won(finalTotal)));
                
                try { await navigator.clipboard.writeText(lines.join("\n")); alert("복사되었습니다!"); } 
                catch { alert("복사 실패"); }
            };

            const generateImageBlob = async () => {
                if (!window.html2canvas) { 
                    await new Promise(r => { const s = document.createElement("script"); s.src = "https://html2canvas.hertzen.com/dist/html2canvas.min.js"; s.onload = r; document.head.appendChild(s); }); 
                }
                const el = document.getElementById("receipt-capture-area");
                const clone = el.cloneNode(true);
                document.body.appendChild(clone);
                clone.style.position = "absolute";
                clone.style.left = "-9999px";
                clone.style.top = "0px";
                clone.style.width = el.offsetWidth + "px";
                
                const canvas = await window.html2canvas(clone, { backgroundColor: "#f6f4ef", scale: 3, useCORS: true, scrollY: 0 });
                document.body.removeChild(clone);
                return new Promise(r => canvas.toBlob(r, "image/png"));
            };

            const saveImage = async () => { 
                setIsProcessing(true); 
                try { 
                    const blob = await generateImageBlob(); 
                    const url = URL.createObjectURL(blob); 
                    const a = document.createElement("a"); 
                    a.download = `정산서_${client}_${year}년${month+1}월.png`; 
                    a.href = url; a.click(); 
                    URL.revokeObjectURL(url); 
                } catch { alert("이미지 저장 오류"); } 
                finally { setIsProcessing(false); } 
            };

            // 카톡 공유
            const shareImage = async () => { 
                setIsProcessing(true); 
                try { 
                    const blob = await generateImageBlob(); 
                    const file = new File([blob], `정산서_${client}_${year}년${month+1}월.png`, { type: "image/png" }); 
                    if (navigator.canShare && navigator.canShare({ files: [file] })) { 
                        await navigator.share({ 
                            files: [file], 
                            title: `${client} 정산서`,
                            text: `${month + 1}월 정산 내역입니다.\n정산 부탁드립니다.\n감사합니다.`
                        }); 
                    } else { alert("이 기기에서는 공유를 지원하지 않습니다."); } 
                } catch (e) { if (e.name !== "AbortError") alert("공유 오류"); } 
                finally { setIsProcessing(false); } 
            };

            const thS = { textAlign: "left", padding: "12px 0", fontSize: 10, fontWeight: 800, color: "#888", letterSpacing: "2px", borderBottom: "1px solid #111" };
            const thR = { ...thS, textAlign: "right" };
            const tdS = { padding: "14px 0", fontSize: 15, fontWeight: 600, color: "#222", borderBottom: "1px solid #ddd" };
            const tdR = { ...tdS, textAlign: "right", fontWeight: 800 };
            const hasUnpaidDetail = unpaid > 0 && sortedUnpaidItems.length > 0;

            return (
                <div style={{ ...S.overlay, zIndex: 20, background: "#0f111a", padding: 0, flexDirection: "column" }} onClick={onClose}>
                    <div
                        className="animate-pop"
                        onClick={e => e.stopPropagation()}
                        style={{ flex: 1, width: "100%", overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain", padding: "40px 24px 130px", display: "flex", flexDirection: "column", alignItems: "center" }}
                    >
                        {/* 🧾 캡처 영역 시작 */}
                        <div id="receipt-capture-area" style={{ width: "100%", maxWidth: 400, background: "#f6f4ef", padding: "52px 38px 44px", color: "#111", fontFamily: "'Pretendard', -apple-system, sans-serif", minHeight: 520, flexShrink: 0 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 40, borderBottom: "2px solid #111", paddingBottom: 24 }}>
                                <div style={{ display: "flex", flexDirection: "column", justifyContent: "space-between", height: 38 }}>
                                    <div style={{ fontSize: 10, fontWeight: 800, color: "#888", letterSpacing: "3px" }}>ISSUED BY</div>
                                    <div style={{ fontSize: 15, fontWeight: 900, color: "#111", letterSpacing: "1px" }}>KIM MINWOO</div>
                                </div>
                                <div style={{ fontSize: 38, fontWeight: 900, color: "#111", letterSpacing: "-1px", lineHeight: 1 }}>INVOICE</div>
                            </div>

                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", padding: "0 0 16px 0", marginBottom: 20 }}>
                                <div>
                                    <div style={{ fontSize: 10, fontWeight: 800, color: "#888", letterSpacing: "2px", marginBottom: 6 }}>CLIENT</div>
                                    <div style={{ fontSize: 20, fontWeight: 900, color: "#111" }}>{client}</div>
                                </div>
                                <div style={{ textAlign: "right" }}>
                                    <div style={{ fontSize: 10, fontWeight: 800, color: "#888", letterSpacing: "2px", marginBottom: 6 }}>DATE</div>
                                    <div style={{ fontSize: 14, fontWeight: 700, color: "#555" }}>{year}년 {month+1}월</div>
                                </div>
                            </div>

                            <div style={{ background: "#111", borderRadius: 12, padding: "24px", marginBottom: 36, display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 10px 20px rgba(0,0,0,0.08)" }}>
                                <span style={{ fontSize: 12, fontWeight: 800, color: "rgba(255,255,255,0.6)", letterSpacing: "2px", flexShrink: 0 }}>TOTAL DUE</span>
                                <div style={{ textAlign: "right", whiteSpace: "nowrap", flexShrink: 1, minWidth: 0, marginLeft: 12 }}>
                                    <span style={{ fontSize: dueFontSize, fontWeight: 900, color: "#fff", letterSpacing: "-0.5px" }}>{finalTotalStr}<span style={{ fontSize: 14, fontWeight: 700, color: "rgba(255,255,255,0.4)", marginLeft: 4 }}>원</span></span>
                                    {finalTotal < 0 && <div style={{ fontSize: 11, color: "#9ece6a", fontWeight: 800, marginTop: 4, whiteSpace: "normal" }}>선지급 잔액: +{won(Math.abs(finalTotal))}</div>}
                                </div>
                            </div>

                            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 28 }}>
                                <thead>
                                    <tr><th style={thS}>DESCRIPTION</th><th style={thR}>AMOUNT</th></tr>
                                </thead>
                                <tbody>
                                    {items.map(e => (
                                        <tr key={e.id}>
                                            <td style={{...tdS, color: e.discount?"#c0392b":"#222"}}>{tag(e)}</td>
                                            <td style={{...tdR, color: e.discount?"#c0392b":"#222"}}>{e.discount?"-":""}{Math.abs(e.amount).toLocaleString("ko-KR")}</td>
                                        </tr>
                                    ))}
                                    {unpaid > 0 && <tr><td style={{...tdS, color: "#b8860b", fontWeight: 700, borderBottom: hasUnpaidDetail?"none":"1px solid #ddd"}}>미정산 이월</td><td style={{...tdR, color: "#b8860b", borderBottom: hasUnpaidDetail?"none":"1px solid #ddd"}}>+{Math.abs(unpaid).toLocaleString("ko-KR")}</td></tr>}
                                    
                                    {hasUnpaidDetail && sortedUnpaidItems.map((e, i) => {
                                        const itemMonth = new Date(e.date).getMonth() + 1;
                                        return (
                                            <tr key={`up-${e.id||i}`}>
                                                <td style={{padding: "6px 0 6px 18px", fontSize: 12, fontWeight: 600, color: "#777", borderBottom: i===sortedUnpaidItems.length-1?"1px solid #ddd":"none"}}>
                                                    - {tag(e)} ({itemMonth}월)
                                                </td>
                                                <td style={{padding: "6px 0", fontSize: 12, fontWeight: 800, color: "#777", textAlign: "right", borderBottom: i===sortedUnpaidItems.length-1?"1px solid #ddd":"none"}}>
                                                    {e.discount?"-":""}{Math.abs(e.amount).toLocaleString("ko-KR")}
                                                </td>
                                            </tr>
                                        );
                                    })}

                                    {unpaid < 0 && <tr><td style={{...tdS, color: "#27ae60", fontWeight: 700}}>선지급 차감</td><td style={{...tdR, color: "#27ae60"}}>-{Math.abs(unpaid).toLocaleString("ko-KR")}</td></tr>}
                                </tbody>
                            </table>

                            <div style={{ borderTop: "2px solid #111", borderBottom: "2px solid #111", padding: "16px 0", marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                <span style={{ fontSize: 14, fontWeight: 900, color: "#111", letterSpacing: "1px", flexShrink: 0 }}>TOTAL</span>
                                <div style={{ textAlign: "right", whiteSpace: "nowrap", flexShrink: 1, minWidth: 0, marginLeft: 12 }}>
                                    <span style={{ fontSize: totalFontSize, fontWeight: 900, color: "#111" }}>{finalTotalStr}</span>
                                    {finalTotal < 0 && <div style={{ fontSize: 11, color: "#27ae60", fontWeight: 800, marginTop: 2, whiteSpace: "normal" }}>선지급 잔액: +{won(Math.abs(finalTotal))}</div>}
                                </div>
                            </div>

                            <div style={{ marginTop: 44, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                                <div style={{ fontSize: 10, color: "#aaa", fontWeight: 700, letterSpacing: "1px" }}>THANK YOU FOR YOUR BUSINESS</div>
                                <div style={{ fontSize: 10, fontWeight: 900, color: "#ccc", letterSpacing: "2px" }}>KIM MINWOO</div>
                            </div>
                        </div>
                        {/* 🧾 캡처 영역 끝 */}

                        <div style={{ width: "100%", maxWidth: 400, display: "flex", flexDirection: "column", gap: 10, marginTop: 24, flexShrink: 0 }}>
                            <div style={{ display: "flex", gap: 10 }}>
                                <button onClick={saveImage} disabled={isProcessing} style={{ flex: 1, padding: "14px", background: "#7aa2f7", border: "none", borderRadius: 14, color: "#0f111a", fontWeight: 900, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 이미지 저장
                                </button>
                                <button onClick={shareImage} disabled={isProcessing} style={{ flex: 1, padding: "14px", background: "#9ece6a", border: "none", borderRadius: 14, color: "#0f111a", fontWeight: 900, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 카톡 공유
                                </button>
                            </div>
                            <div style={{ display: "flex", gap: 10 }}>
                                <button onClick={copyText} style={{ flex: 1, padding: "14px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 14, color: "#e0e2eb", fontWeight: 800, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 텍스트 복사
                                </button>
                                <button onClick={onClose} style={{ flex: 1, padding: "14px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 14, color: "#a9b1d6", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>닫기</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── 정산 탭 ───
        function SummaryTab({ entries, unpaidMap, year, month, onDelete, onEditEntry, allEntries, setHideHeader }) {
            const [selDay, setSelDay] = useState(null); 
            const [openClient, setOpenClient] = useState(null); 
            const [receiptClient, setReceiptClient] = useState(null);
            const [editId, setEditId] = useState(null); 
            const [editAmt, setEditAmt] = useState(""); 
            const [editDesc, setEditDesc] = useState("");
            
            const groups = {}; 
            (entries||[]).forEach(e => { 
                if (!groups[e.client]) groups[e.client] = { total: 0, count: 0, items: [] }; 
                groups[e.client].total += amt(e); 
                groups[e.client].count++; 
                groups[e.client].items.push(e); 
            });
            const grandTotal = (entries||[]).reduce((s, e) => s + amt(e), 0);
            const allClients = [...new Set([...Object.keys(groups), ...Object.keys(unpaidMap || {})])];
            const deadlines = (entries||[]).filter(e => e.deadline && !e.paid).sort((a,b) => new Date(a.deadline) - new Date(b.deadline));
            
            const doEdit = (e) => { 
                const r = parseInt(editAmt.replace(/,/g,""),10); 
                if (!isNaN(r) && r > 0) onEditEntry(e.id, r, editDesc); 
                setEditId(null); 
            };

            useEffect(() => {
                if (setHideHeader) setHideHeader(!!receiptClient);
                return () => { if (setHideHeader) setHideHeader(false); };
            }, [receiptClient, setHideHeader]);

            return (
                <div className="animate-fade">
                    <TotalDashboard current={grandTotal} unpaidMap={unpaidMap} />
                    
                    {deadlines.length > 0 && (
                        <div style={{ marginBottom: 24, padding: "0 4px" }}>
                            <div style={{fontSize: 14, fontWeight: 800, color: "#f7768e", marginBottom: 12, display: "flex", alignItems: "center", gap: 6}}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 다가오는 마감일
                            </div>
                            <div style={{display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8}}>
                                {deadlines.map(e => { 
                                    const dday = getDDay(e.deadline); 
                                    return (
                                        <div key={e.id} style={{ background: "rgba(247,118,142,0.1)", border: "1px solid rgba(247,118,142,0.2)", borderRadius: 16, padding: "12px 16px", minWidth: 140 }}>
                                            <div style={{fontSize: 12, fontWeight: 700, color: dday<=0?"#f7768e":"#e0af68"}}>{dday===0?"D-Day (오늘)":dday<0?`${Math.abs(dday)}일 지남`:`D-${dday}`}</div>
                                            <div style={{fontSize: 14, fontWeight: 800, marginTop: 4, whiteSpace: "nowrap"}}>{e.client}</div>
                                            <div style={{fontSize: 12, color: "#8a94b5", marginTop: 2, textOverflow: "ellipsis", overflow: "hidden", whiteSpace: "nowrap", maxWidth: 100}}>{e.desc||"작업"}</div>
                                        </div>
                                    ); 
                                })}
                            </div>
                        </div>
                    )}

                    <Calendar year={year} month={month} entries={entries} selectedDay={selDay} onSelect={setSelDay} />
                    
                    {selDay && (
                        <div className="animate-pop" style={{...S.card, padding: 24, marginBottom: 24, border: "1px solid rgba(122,162,247,0.4)"}}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                                <span style={{ fontSize: 18, fontWeight: 800, color: "#c0caf5" }}>{month+1}월 {selDay}일</span>
                                <button onClick={() => setSelDay(null)} style={{ background: "none", border: "none", color: "#565f89", fontSize: 20, cursor: "pointer", padding: "0 8px" }}>✕</button>
                            </div>
                            {(entries||[]).filter(e => new Date(e.date).getDate()===selDay).map(e => (
                                <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                    <div>
                                        <div style={{ fontSize: 16, fontWeight: 800, color: "#e0e2eb" }}>{e.client}</div>
                                        <div style={{ fontSize: 13, color: e.discount?"#f7768e":"#8a94b5", marginTop: 4 }}>{tag(e)}</div>
                                    </div>
                                    <div style={{ fontSize: 17, fontWeight: 800, color: e.discount?"#f7768e":"#7aa2f7" }}>
                                        {e.discount?"-":""}{won(e.amount)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{ display: "flex", flexDirection: "column", gap: 14, paddingBottom: 20 }}>
                        {allClients.map((name, i) => {
                            const g = groups[name]; 
                            const un = (unpaidMap||{})[name]||0; 
                            const total = (g?g.total:0)+un;
                            
                            if (total===0 && !g) return null;
                            const c = COLORS[i%8]; 
                            const isOpen = openClient===name; 
                            const items = g?g.items:[];

                            return (
                                <div key={name} style={{ background: isOpen?"rgba(36,40,59,0.9)":"rgba(36,40,59,0.5)", borderRadius: 18, border: "1px solid rgba(255,255,255,0.05)", borderLeft: `5px solid ${c}`, overflow: "hidden", transition: "all 0.3s" }}>
                                    <div onClick={() => setOpenClient(isOpen?null:name)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 16px", cursor: "pointer" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                                            <span style={{ fontSize: 17, fontWeight: 800, color: "#fff" }}>{name}</span>
                                            {un > 0 && <span style={{ background: "rgba(247,118,142,0.15)", color: "#f7768e", padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 800 }}>미정산</span>}
                                            {un < 0 && <span style={{ background: "rgba(158,206,106,0.15)", color: "#9ece6a", padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 800 }}>선지급</span>}
                                            {g && <span style={{ fontSize: 12, fontWeight: 700, color: "#8a94b5", background: "rgba(0,0,0,0.3)", padding: "4px 10px", borderRadius: 12 }}>{g.count}건</span>}
                                        </div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                            <span style={{ fontSize: 18, fontWeight: 900, color: total<0?"#9ece6a":c }}>{total<0?`+${won(Math.abs(total))}`:won(total)}</span>
                                            <span style={{ fontSize: 14, color: "#565f89", transform: isOpen?"rotate(180deg)":"rotate(0)", transition: "0.3s" }}>▼</span>
                                        </div>
                                    </div>

                                    {isOpen && (
                                        <div className="animate-slide" style={{ padding: "0 16px 16px" }}>
                                            {items.map(e => (
                                                <div key={e.id} style={{ padding: "14px 0", borderBottom: "1px dashed rgba(255,255,255,0.1)" }}>
                                                    {editId===e.id ? (
                                                        <div style={{ display: "flex", alignItems: "center", gap: 6, width: "100%" }}>
                                                            <input value={editDesc} onChange={ev => setEditDesc(ev.target.value)} placeholder="내용" style={{ flex: 1, padding: "10px", background: "rgba(0,0,0,0.4)", border: "1px solid #7aa2f7", borderRadius: 10, color: "#fff", fontSize: 14, minWidth: 0 }} />
                                                            <input value={editAmt} onChange={ev => setEditAmt(fmt(ev.target.value))} inputMode="numeric" style={{ width: 85, padding: "10px", background: "rgba(0,0,0,0.4)", border: "1px solid #7aa2f7", borderRadius: 10, color: "#fff", fontSize: 14, fontWeight: 800, textAlign: "right", minWidth: 0 }} onKeyDown={ev => { if (ev.key==="Enter") doEdit(e); if (ev.key==="Escape") setEditId(null); }} />
                                                            <button onClick={() => doEdit(e)} style={{ padding: "10px 14px", background: "#7aa2f7", border: "none", borderRadius: 10, color: "#0f111a", fontSize: 14, fontWeight: 900, flexShrink: 0 }}>확인</button>
                                                        </div>
                                                    ) : (
                                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                            <div>
                                                                <div style={{ fontSize: 15, fontWeight: 600, color: e.discount?"#f7768e":"#c0caf5" }}>{tag(e)}</div>
                                                                {e.deadline && <div style={{fontSize: 11, color: "#f7768e", marginTop: 4}}>마감: {e.deadline}</div>}
                                                            </div>
                                                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                                                <span style={{ fontSize: 16, fontWeight: 800, color: e.discount?"#f7768e":"#fff" }}>{e.discount?"-":""}{won(e.amount)}</span>
                                                                <button onClick={() => { setEditId(e.id); setEditAmt(e.amount.toLocaleString("ko-KR")); setEditDesc(e.desc||""); }} style={S.editBtn}>수정</button>
                                                                <button onClick={() => onDelete(e)} style={S.delBtn}>✕</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}

                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16, paddingTop: items.length > 0 ? 8 : 0 }}>
                                                <div>
                                                    {un > 0 && <div style={{ fontSize: 13, color: "#e0af68", fontWeight: 700 }}>미정산 이월: +{won(un)}</div>}
                                                    {un < 0 && <div style={{ fontSize: 13, color: "#9ece6a", fontWeight: 700 }}>선지급 차감: -{won(Math.abs(un))}</div>}
                                                </div>
                                                <button onClick={ev => { ev.stopPropagation(); setReceiptClient(name); }} style={{ padding: "10px 16px", background: "rgba(122,162,247,0.15)", border: "1px solid rgba(122,162,247,0.3)", borderRadius: 12, color: "#7aa2f7", fontSize: 14, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> 정산서 보기
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                        {allClients.length === 0 && <div style={S.empty}>이번 달 작업 기록이 없습니다.</div>}
                    </div>

                    {receiptClient && (() => {
                        const curMk = mk(year, month);
                        const clientUnpaidItems = (allEntries || []).filter(e => {
                            const d = new Date(e.date);
                            return e.client === receiptClient && mk(d.getFullYear(), d.getMonth()) < curMk && !e.paid;
                        });
                        return <ReceiptModal client={receiptClient} month={month} year={year} items={groups[receiptClient]?.items || []} unpaid={(unpaidMap||{})[receiptClient]||0} unpaidItems={clientUnpaidItems} onClose={() => setReceiptClient(null)} />;
                    })()}
                </div>
            );
        }

        // ─── 입금 탭 ───
        function PaymentTab({ entries, unpaidMap, endOfMonthUnpaidMap, onFullCheck, onPartialPay, onResetPay, monthKey, payments }) {
            const byClient = {}; 
            (entries||[]).forEach(e => { 
                if (!byClient[e.client]) byClient[e.client] = []; 
                byClient[e.client].push(e); 
            });
            const allClients = [...new Set([...Object.keys(byClient), ...Object.keys(unpaidMap||{})])];
            
            const rows = allClients.map(client => {
                const items = byClient[client]||[]; 
                const thisTotal = items.reduce((s,e) => s+amt(e), 0);
                const unpaid = (unpaidMap||{})[client]||0; 
                const endUnpaid = (endOfMonthUnpaidMap||{})[client]||0; 
                const total = thisTotal+unpaid;
                
                if (items.length===0 && unpaid===0 && endUnpaid===0) return null;
                
                const paid = items.length>0 && items.every(e => e.paid); 
                const paidAmt = (payments&&payments[`${monthKey}::${client}`])||0;
                const done = (items.length===0||paid) && endUnpaid<=0; 
                const isFullyPaid = done||(total>0&&paidAmt>=total)||endUnpaid<=0;
                
                return { client, items, thisTotal, unpaid, total, paid, paidAmt, endUnpaid, isFullyPaid };
            }).filter(Boolean);

            const totalDue = rows.reduce((s,r) => s+r.total, 0);
            const totalPaid = rows.reduce((s,r) => s+(r.paidAmt||0)+(r.paid&&r.items.length>0?r.thisTotal:0), 0);
            
            if (rows.length===0) return <div className="animate-fade" style={S.card}><div style={S.empty}>이번 달 기록이 없습니다.</div></div>;
            
            return (
                <div className="animate-fade">
                    <div style={{ background: "rgba(36,40,59,0.6)", borderRadius: 24, padding: "24px 20px", marginBottom: 24, border: "1px solid rgba(255,255,255,0.05)", display: "flex", justifyContent: "space-between" }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 13, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>총 정산액</div>
                            <div style={{ fontSize: 20, fontWeight: 900, color: "#c0caf5", whiteSpace: "nowrap", letterSpacing: "-0.5px" }}>{totalDue<0?`-${won(Math.abs(totalDue))}`:won(totalDue)}</div>
                        </div>
                        <div style={{ width: 1, background: "rgba(255,255,255,0.1)", margin: "0 16px" }} />
                        <div style={{ flex: 1, textAlign: "right", minWidth: 0 }}>
                            <div style={{ fontSize: 13, color: "#8a94b5", fontWeight: 700, marginBottom: 8 }}>완료된 입금</div>
                            <div style={{ fontSize: 20, fontWeight: 900, color: "#9ece6a", whiteSpace: "nowrap", letterSpacing: "-0.5px" }}>{won(totalPaid)}</div>
                        </div>
                    </div>
                    {rows.map(r => <PayRow key={r.client} {...r} onCheck={() => onFullCheck(r.client, monthKey, !r.isFullyPaid)} onPay={a => onPartialPay(r.client, monthKey, a)} onReset={() => onResetPay(r.client)} />)}
                </div>
            );
        }

        // ─── 입금 항목 (PayRow) ───
        function PayRow({ client, total, thisTotal, unpaid, isFullyPaid, paidAmt, endUnpaid, items, onCheck, onPay, onReset }) {
            const [open, setOpen] = useState(false); 
            const [val, setVal] = useState("");

            const go = () => { 
                const r = parseInt(val.replace(/,/g,""),10); 
                if(!isNaN(r) && r>0){ onPay(r); setVal(""); setOpen(false); }
            };

            return (
                <div style={{ background: isFullyPaid?"rgba(26,27,38,0.5)":"rgba(36,40,59,0.9)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 20, padding: "20px 16px", marginBottom: 16, transition: "all 0.3s ease", opacity: isFullyPaid?0.6:1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <label style={{ display: "flex", alignItems: "center", gap: 16, cursor: "pointer", flex: 1 }}>
                            <div style={{ width: 34, height: 34, borderRadius: "50%", background: isFullyPaid?"#9ece6a":"rgba(0,0,0,0.3)", border: isFullyPaid?"none":"2px solid #565f89", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                <input type="checkbox" checked={isFullyPaid} onChange={onCheck} style={{ opacity: 0, position: "absolute", width: 34, height: 34, cursor: "pointer" }} />
                                {isFullyPaid && <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f111a" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>}
                            </div>
                            <div style={{ minWidth: 0, flex: 1, paddingRight: 8 }}>
                                <div style={{ fontSize: 18, fontWeight: 900, color: isFullyPaid?"#7a84a6":"#fff", textDecoration: isFullyPaid&&total>0?"line-through":"none", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{client}</div>
                                {unpaid>0 && <div style={{ fontSize: 11, color: "#e0af68", marginTop: 4, fontWeight: 700 }}>미정산 이월 포함됨</div>}
                                {unpaid<0 && <div style={{ fontSize: 11, color: "#9ece6a", marginTop: 4, fontWeight: 700 }}>선지급 차감됨 (+{won(Math.abs(unpaid))})</div>}
                            </div>
                        </label>
                        <div style={{ flexShrink: 0, textAlign: "right" }}>
                            <span style={{ fontSize: 22, fontWeight: 900, color: isFullyPaid?"#7a84a6":"#7aa2f7", textDecoration: isFullyPaid&&total>0?"line-through":"none" }}>{total<0?`-${won(Math.abs(total))}`:won(total)}</span>
                        </div>
                    </div>
                    
                    {paidAmt>0 && (
                        <div className="animate-fade" style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 12, marginTop: 16, paddingTop: 16, borderTop: "1px dashed rgba(255,255,255,0.1)" }}>
                            {endUnpaid<0 
                                ? <span style={{ fontSize: 13, color: "#9ece6a", fontWeight: 800 }}>정산 후 남은 금액(선지급): +{won(Math.abs(endUnpaid))}</span> 
                                : <span style={{ fontSize: 14, color: isFullyPaid?"#7aa2f7":"#9ece6a", fontWeight: 800 }}>누적 입금: {won(paidAmt)}</span>}
                            <button onClick={onReset} style={{ background: "rgba(231,76,60,0.15)", border: "none", borderRadius: 10, color: "#e74c3c", fontSize: 13, fontWeight: 800, padding: "8px 14px", cursor: "pointer", flexShrink: 0 }}>취소</button>
                        </div>
                    )}
                    
                    {!isFullyPaid && (
                        <div style={{ marginTop: 16 }}>
                            {!open ? (
                                <button onClick={() => setOpen(true)} style={S.partialBtn}>+ 분할 입금액 추가</button>
                            ) : (
                                <div className="animate-slide">
                                    <div style={{ display: "flex", gap: 10 }}>
                                        <input value={val} onChange={e => setVal(fmt(e.target.value))} placeholder="입금된 금액" inputMode="numeric" style={{...S.partialInput, minWidth: 0}} onKeyDown={e => e.key==="Enter"&&go()} autoFocus />
                                        <button onClick={go} style={{ padding: "0 20px", background: "#7aa2f7", border: "none", borderRadius: 14, color: "#0f111a", fontWeight: 900, fontSize: 16, flexShrink: 0 }}>확인</button>
                                        <button onClick={() => { setOpen(false); setVal(""); }} style={{ padding: "0 16px", background: "rgba(0,0,0,0.3)", border: "none", borderRadius: 14, color: "#a9b1d6", fontWeight: 800, flexShrink: 0 }}>취소</button>
                                    </div>
                                    <QuickBtns val={val} setVal={setVal} />
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ─── ✨ 입력 폼 (스와이프 다운 닫기 완벽 적용) ✨ ───
        function BottomSheetForm({ clients, onAdd, onNewClient, onClose }) {
            const [client, setClient] = useState(""); 
            const [amount, setAmount] = useState(""); 
            const [desc, setDesc] = useState("");
            const [dateVal, setDateVal] = useState(today()); 
            const [deadline, setDeadline] = useState(""); 
            const [useDeadline, setUseDeadline] = useState(false);
            const [discount, setDiscount] = useState(false); 
            const [showNew, setShowNew] = useState(false); 
            const [newName, setNewName] = useState(""); 
            const [isSubmitting, setIsSubmitting] = useState(false);

            // ✨ 스와이프를 위한 상태 추가
            const [startY, setStartY] = useState(null);
            const [translateY, setTranslateY] = useState(0);

            // ✨ 뒷배경 스크롤 방지
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = ''; };
            }, []);
            
            const submit = () => { 
                if (isSubmitting) return; 
                if (!client || !amount) return; 
                const raw = parseInt(amount.replace(/,/g,""),10); 
                if (isNaN(raw) || raw<=0) return; 
                
                setIsSubmitting(true); 
                const [y,m,d] = dateVal.split("-").map(Number); 
                onAdd({ 
                    client, 
                    amount: raw, 
                    desc: discount ? "" : desc.trim(), 
                    date: new Date(y,m-1,d,12).toISOString(), 
                    deadline: useDeadline ? deadline : null, 
                    discount 
                }); 
                setTimeout(() => { setIsSubmitting(false); onClose(); }, 100); 
            };
            
            const addC = () => { 
                if (!newName.trim()) return; 
                onNewClient(newName.trim()); 
                setClient(newName.trim()); 
                setNewName(""); 
                setShowNew(false); 
            };

            // ✨ 터치 이벤트 핸들러 (스와이프로 창 끄기)
            const handleTouchStart = (e) => setStartY(e.touches[0].clientY);
            const handleTouchMove = (e) => {
                if (startY === null) return;
                const currentY = e.touches[0].clientY;
                const diff = currentY - startY;
                if (diff > 0) setTranslateY(diff); // 아래로 드래그할 때만 창이 내려감
            };
            const handleTouchEnd = () => {
                if (translateY > 120) onClose(); // 120px 이상 쓸어내리면 닫기
                else setTranslateY(0); // 아니면 다시 위로 원상복구
                setStartY(null);
            };

            return (
                <div style={{...S.overlay, alignItems: "flex-end", padding: 0}} onClick={onClose}>
                    <div 
                        className="animate-slide" 
                        onClick={e => e.stopPropagation()} 
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                        style={{ 
                            background: "#1a1b26", 
                            width: "100%", 
                            maxWidth: 480, 
                            borderTopLeftRadius: 36, 
                            borderTopRightRadius: 36, 
                            padding: "0 24px calc(env(safe-area-inset-bottom) + 30px)", 
                            boxShadow: "0 -10px 40px rgba(0,0,0,0.6)", 
                            display: "flex", 
                            flexDirection: "column",
                            // 손가락 움직임 반영 및 부드러운 애니메이션 처리
                            transform: `translateY(${translateY}px)`,
                            transition: startY !== null ? 'none' : 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'
                        }}
                    >
                        {/* ✨ 스와이프 핸들바 (디자인) */}
                        <div style={{ width: 40, height: 5, background: "rgba(255,255,255,0.2)", borderRadius: 3, margin: "12px auto 8px" }} />

                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 12, paddingBottom: 24 }}>
                            <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>새 작업 기록</div>
                            {/* 기존의 X 닫기 버튼 삭제 완료 */}
                        </div>

                        <div style={{...S.field, width: "100%", boxSizing: "border-box"}}>
                            <div style={{ display: "flex", gap: 10, width: "100%" }}>
                                <input type="date" value={dateVal} onChange={e => setDateVal(e.target.value)} style={{...S.input, colorScheme: "dark", flex: 1, minWidth: 0, padding: "14px 12px"}} />
                                {!showNew && (
                                    <select value={client} onChange={e => setClient(e.target.value)} style={{...S.select, flex: 1.5, minWidth: 0, padding: "14px 12px"}}>
                                        <option value="">업체 선택</option>
                                        {(clients||[]).map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                )}
                                {showNew && <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="새 업체명" style={{...S.input, flex: 1.5, minWidth: 0, padding: "14px 12px"}} onKeyDown={e => e.key==="Enter"&&addC()} autoFocus />}
                                {showNew ? (
                                    <button onClick={addC} style={{...S.confirmBtn, flexShrink: 0, padding: "0 16px"}}>추가</button>
                                ) : (
                                    <button onClick={() => setShowNew(true)} style={{...S.plusBtn, background: "rgba(255,255,255,0.05)", color: "#7aa2f7", flexShrink: 0, width: 52}}>+</button>
                                )}
                                {showNew && <button onClick={() => setShowNew(false)} style={{...S.plusBtn, background: "rgba(255,255,255,0.05)", color: "#a9b1d6", flexShrink: 0, width: 52}}>✕</button>}
                            </div>
                        </div>

                        <div style={{...S.field, width: "100%", boxSizing: "border-box"}}>
                            <div style={{ display: "flex", alignItems: "center", background: "rgba(0,0,0,0.2)", borderRadius: 18, border: "1px solid rgba(255,255,255,0.05)", padding: "10px 20px", width: "100%", boxSizing: "border-box" }}>
                                <input value={amount} onChange={e => setAmount(fmt(e.target.value))} placeholder="0" inputMode="numeric" style={{ flex: 1, background: "none", border: "none", color: discount?"#f7768e":"#7aa2f7", fontSize: 32, fontWeight: 900, textAlign: "right", outline: "none", padding: "16px 0", minWidth: 0 }} onKeyDown={e => e.key==="Enter"&&submit()} />
                                <span style={{ fontSize: 22, color: "#8a94b5", fontWeight: 800, marginLeft: 10, flexShrink: 0 }}>원</span>
                            </div>
                            <QuickBtns val={amount} setVal={setAmount} />
                        </div>

                        <div style={{ display: "flex", gap: 12, marginBottom: 16, width: "100%", boxSizing: "border-box" }}>
                            <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", background: discount?"rgba(247,118,142,0.15)":"rgba(255,255,255,0.05)", padding: "16px", borderRadius: 14, border: `1px solid ${discount?"#f7768e":"transparent"}`, flexShrink: 0, whiteSpace: "nowrap" }}>
                                <input type="checkbox" checked={discount} onChange={e => setDiscount(e.target.checked)} style={{ accentColor: "#f7768e", width: 22, height: 22, margin: 0 }} />
                                <span style={{ fontSize: 16, color: discount?"#f7768e":"#a9b1d6", fontWeight: 800 }}>할인 적용</span>
                            </label>
                            {!discount && <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="작업 내용 (선택)" style={{...S.input, flex: 1, minWidth: 0}} onKeyDown={e => e.key==="Enter"&&submit()} />}
                        </div>

                        <div style={{...S.field, width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.02)", padding: "16px", borderRadius: 14}}>
                            <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                                <input type="checkbox" checked={useDeadline} onChange={e => setUseDeadline(e.target.checked)} style={{ accentColor: "#f7768e", width: 20, height: 20, margin: 0 }} />
                                <span style={{ fontSize: 15, color: useDeadline?"#f7768e":"#a9b1d6", fontWeight: 800 }}>마감일 알림 추가하기</span>
                            </label>
                            {useDeadline && (
                                <div className="animate-fade" style={{ marginTop: 12 }}>
                                    <input type="date" value={deadline} onChange={e => setDeadline(e.target.value)} style={{...S.input, width: "100%", boxSizing: "border-box", colorScheme: "dark", borderColor: "rgba(247,118,142,0.4)"}} />
                                </div>
                            )}
                        </div>
                        
                        <button onClick={submit} disabled={!client||!amount||isSubmitting} style={{...S.submitBtn, opacity: client&&amount?1:0.3, background: discount?"linear-gradient(135deg,#f7768e 0%,#ff9e64 100%)":"linear-gradient(135deg,#7aa2f7 0%,#bb9af7 100%)", width: "100%"}}>
                            {discount?"할인 내역 저장":"기록 저장하기"}
                        </button>
                    </div>
                </div>
            );
        }

        // ─── 삭제 모달 ───
        function DeleteModal({ entry, onConfirm, onCancel }) {
            if (!entry) return null;
            return (
                <div style={S.overlay} onClick={onCancel}>
                    <div className="animate-pop" onClick={e => e.stopPropagation()} style={{...S.card, width: "100%", maxWidth: 320, padding: 24, textAlign: "center", background: "#1a1b26"}}>
                        <div style={{width: 60, height: 60, borderRadius: "50%", background: "rgba(231,76,60,0.1)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px"}}>
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </div>
                        <h3 style={{marginTop: 0, marginBottom: 12, fontSize: 20, fontWeight: 900, color: "#fff"}}>기록 삭제</h3>
                        <p style={{fontSize: 15, color: "#8a94b5", lineHeight: 1.5, marginBottom: 24, wordBreak: "keep-all"}}>정말 이 기록을 삭제할까요?<br/>삭제된 데이터는 복구할 수 없습니다.</p>
                        <div style={{display: "flex", gap: 10}}>
                            <button onClick={onCancel} style={{flex: 1, padding: "14px", background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 14, color: "#a9b1d6", fontSize: 16, fontWeight: 800, cursor: "pointer"}}>취소</button>
                            <button onClick={onConfirm} style={{flex: 1, padding: "14px", background: "#e74c3c", border: "none", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer"}}>삭제하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── ✨ 메인 앱 로직 ✨ ───
        function MainApp({ data, persist, user }) {
            const safeData = sanitizeData(data);
            const [pinState, setPinState] = useState(safeData.pin ? "verify" : "setup");
            const [vY, setVY] = useState(() => new Date().getFullYear()); 
            const [vM, setVM] = useState(() => new Date().getMonth());
            const [tab, setTab] = useState("summary"); 
            const [del, setDel] = useState(null);
            const [showAdd, setShowAdd] = useState(false); 
            const [showClientManager, setShowClientManager] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [hideHeader, setHideHeader] = useState(false); 

            useEffect(() => { 
                const lockApp = () => { if (safeData.pin) setPinState("verify"); }; 
                const hvc = () => { if (document.visibilityState==="hidden") lockApp(); }; 
                document.addEventListener("visibilitychange", hvc); 
                window.addEventListener("pagehide", lockApp); 
                return () => { document.removeEventListener("visibilitychange", hvc); window.removeEventListener("pagehide", lockApp); }; 
            }, [safeData.pin]);

            // ✨ 잠금 해제 시 항상 '이번 달' 달력으로 리셋되도록 수정
            const handlePinSuccess = (p) => { 
                const n = new Date();
                if (pinState === "setup" || pinState === "change_new") { 
                    persist({...safeData, pin: p}); 
                    setPinState("unlocked"); 
                    setVY(n.getFullYear()); setVM(n.getMonth());
                } 
                else if (pinState === "verify") { 
                    setPinState("unlocked"); 
                    setVY(n.getFullYear()); setVM(n.getMonth());
                } 
                else if (pinState === "change_old") { 
                    setPinState("change_new"); 
                } 
            };

            const onUpdateClient = (oldN, newN) => { 
                if (oldN===newN||!newN.trim()||safeData.clients.includes(newN)) return; 
                const nc = safeData.clients.map(c => c===oldN?newN:c); 
                const ne = safeData.entries.map(e => e.client===oldN?{...e, client: newN}:e); 
                const np = {}; 
                Object.entries(safeData.payments).forEach(([k,v]) => { 
                    if (k.endsWith(`::${oldN}`)) np[k.replace(`::${oldN}`, `::${newN}`)]=v; 
                    else np[k]=v; 
                }); 
                persist({...safeData, clients: nc, entries: ne, payments: np}); 
            };

            const onDeleteClient = (name) => { 
                if (!confirm(`'${name}' 업체를 목록에서 삭제할까요?`)) return; 
                persist({...safeData, clients: safeData.clients.filter(c => c!==name)}); 
            };

            if (pinState !== "unlocked") return <LockScreen mode={pinState} savedPin={safeData.pin} onSuccess={handlePinSuccess} onCancel={pinState.startsWith("change_")?() => setPinState("unlocked"):null} />;

            const curMk = mk(vY, vM); 
            const nextMonthMk = vM===11?mk(vY+1,0):mk(vY,vM+1);
            const monthEntries = safeData.entries.filter(e => { const d = new Date(e.date); return d.getFullYear()===vY&&d.getMonth()===vM; });
            const initialUnpaidMap = calcBalance(safeData.entries, safeData.payments, curMk);
            const endOfMonthUnpaidMap = calcBalance(safeData.entries, safeData.payments, nextMonthMk);

            const onAdd = entry => persist({...safeData, entries: [...safeData.entries, {...entry, id: id(), paid: false}]});
            const onNewClient = name => { if (!safeData.clients.includes(name)) persist({...safeData, clients: [...safeData.clients, name]}); };
            const onPartialPay = (client, key, amount) => { const pk = `${key}::${client}`; persist({...safeData, payments: {...safeData.payments, [pk]: (safeData.payments[pk]||0)+amount}}); };
            const onResetPay = client => { const np = {...safeData.payments}; delete np[`${curMk}::${client}`]; persist({...safeData, payments: np}); };
            const onFullCheck = (client, key, check) => { 
                let ent = safeData.entries; 
                let pay = {...safeData.payments}; 
                const pk = `${key}::${client}`; 
                if (check) { 
                    ent = ent.map(e => { const d = new Date(e.date); return e.client===client&&mk(d.getFullYear(),d.getMonth())===key?{...e, paid: true}:e; }); 
                    const tempBal = calcBalance(ent, pay, nextMonthMk); 
                    const remaining = tempBal[client]||0; 
                    if (remaining>0) pay[pk] = (pay[pk]||0)+remaining; 
                } else { 
                    ent = ent.map(e => { const d = new Date(e.date); return e.client===client&&mk(d.getFullYear(),d.getMonth())===key?{...e, paid: false}:e; }); 
                    delete pay[pk];
